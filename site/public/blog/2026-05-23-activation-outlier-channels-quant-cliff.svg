<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
<title id="title">A few outlier channels make activations far harder to quantize than weights</title>
<desc id="desc">Two-panel data visualization on a warm off-white paper background. Left: a per-channel activation magnitude bar chart, a low flat field of small teal bars with three tall vermilion outlier spikes labeled as roughly 0.1 percent of features running tens to one hundred thousand times the median. Right: two horizontal bars comparing the cost of zeroing the 0.1 percent outlier features (perplexity plus 600 to 1000 percent, top-1 attention mass minus 20 percent) against zeroing a random 0.1 percent (negligible).</desc>
<style>
 .ink{fill:#23303a} .soft{fill:#5d6b72} .faint{fill:#8a9097}
 .t{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif}
 .m{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
 .title{font-size:18px;font-weight:600}
 .sub{font-size:12.5px}
 .ptitle{font-size:14px;font-weight:600}
 .lab{font-size:12px} .labs{font-size:11px} .labf{font-size:10px}
 .bold{font-weight:600}
</style>
<rect width="980" height="600" fill="#f4f1e8"/>
<text class="t title ink" x="40" y="44">Weights quantize. Activations have spikes.</text>
<text class="t sub soft" x="40" y="66">Per-channel activation magnitude in one transformer hidden state, and the cost of quantizing as if the spikes were not there.</text>
<line x1="512" y1="86" x2="512" y2="556" stroke="#ddd6c4" stroke-width="1"/>
<text class="t ptitle ink" x="40" y="108">Per-channel activation magnitude, one hidden state</text>
