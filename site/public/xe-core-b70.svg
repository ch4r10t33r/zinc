<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1210"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
  </defs>

  <rect width="880" height="700" rx="12" fill="url(#bg2)"/>
  <text x="440" y="32" text-anchor="middle" fill="#e8dcd0" font-size="16" font-weight="600">Xe2 Render Slice — 4 Xe Cores (B70 Battlemage)</text>

  <!-- Render slice outer box -->
  <rect x="20" y="48" width="840" height="610" rx="10" fill="none" stroke="#8a7060" stroke-width="1.5"/>
  <text x="40" y="70" fill="#a09080" font-size="11" font-weight="600">Render Slice (4 Xe Cores)</text>

