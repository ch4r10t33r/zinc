<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1724"/><stop offset="1" stop-color="#171426"/></linearGradient>
<style>.title{fill:#f6fbff;font-size:27px;font-weight:780}.subtitle{fill:#aebdcc;font-size:14px}.rowlab{fill:#c7d4e2;font-size:15px;font-weight:720}.kern{fill:#eaf6f3;font-size:12px;font-weight:640}.kern2{fill:#eaf6f3;font-size:11px;font-weight:600}.note{fill:#f2c39a;font-size:12.5px;font-weight:640}.good{fill:#8fe3a8;font-size:12.5px;font-weight:660}.leg{fill:#aebdcc;font-size:12.5px}.barlab{fill:#f2a05a;font-size:10px;font-weight:640}</style>
</defs>
<rect width="1200" height="760" fill="url(#bg)"/>
<text x="56" y="50" class="title">Fusion deletes the barrier between two decode kernels, not the launch</text>
<text x="56" y="76" class="subtitle">One modeled Qwen3.5-9B decode layer on an RX 9070 XT. Each barrier flushes writes to L2 and invalidates L1 before the next kernel reads.</text>
<text x="56" y="134" class="rowlab" fill="#f2a8b8">Today &#183; 10 kernels, a barrier in nearly every gap</text>
<rect x="56" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="102.0" y="178.0" text-anchor="middle" class="kern">input</text><text x="102.0" y="192.0" text-anchor="middle" class="kern">RMSNorm</text>
<rect x="170" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="216.0" y="178.0" text-anchor="middle" class="kern">weight</text><text x="216.0" y="192.0" text-anchor="middle" class="kern">multiply</text>
<rect x="284" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="330.0" y="178.0" text-anchor="middle" class="kern">QKV</text><text x="330.0" y="192.0" text-anchor="middle" class="kern">projection</text>
<rect x="398" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="444.0" y="185.0" text-anchor="middle" class="kern">RoPE</text>
<rect x="512" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="558.0" y="185.0" text-anchor="middle" class="kern">attention</text>
<rect x="626" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="672.0" y="178.0" text-anchor="middle" class="kern">output</text><text x="672.0" y="192.0" text-anchor="middle" class="kern">projection</text>
<rect x="740" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="786.0" y="178.0" text-anchor="middle" class="kern">post-norm</text><text x="786.0" y="192.0" text-anchor="middle" class="kern">+ multiply</text>
<rect x="854" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="900.0" y="178.0" text-anchor="middle" class="kern">gate + up</text><text x="900.0" y="192.0" text-anchor="middle" class="kern">projection</text>
<rect x="968" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="1014.0" y="185.0" text-anchor="middle" class="kern">SwiGLU</text>
<rect x="1082" y="150" width="92" height="62" rx="8" fill="#123b3a" stroke="#2f6f68" stroke-width="1.4"/><text x="1128.0" y="178.0" text-anchor="middle" class="kern">down</text><text x="1128.0" y="192.0" text-anchor="middle" class="kern">projection</text>
<rect x="155.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="269.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="383.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="497.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="611.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="725.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="839.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="953.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="1067.0" y="144" width="8" height="74" rx="2" fill="#f2a05a"/>
<text x="56" y="242" class="note">9 barriers/layer &#215; ~40 layers &#8776; 4 ms of bubbles/token &#183; the compute units idle through every L2 flush</text>
<text x="56" y="364" class="rowlab" fill="#8fe3a8">After fusion &#183; 4 kernels, 3 barriers</text>
<rect x="56" y="380" width="250" height="62" rx="8" fill="#123b3a" stroke="#3f8f84" stroke-width="1.4"/><text x="181.0" y="408.0" text-anchor="middle" class="kern2">RMSNorm + multiply</text><text x="181.0" y="422.0" text-anchor="middle" class="kern2">QKV projection + RoPE</text>
<rect x="328" y="380" width="150" height="62" rx="8" fill="#123b3a" stroke="#3f8f84" stroke-width="1.4"/><text x="403.0" y="415.0" text-anchor="middle" class="kern2">attention</text>
<rect x="500" y="380" width="205" height="62" rx="8" fill="#123b3a" stroke="#3f8f84" stroke-width="1.4"/><text x="602.5" y="408.0" text-anchor="middle" class="kern2">RMSNorm + multiply</text><text x="602.5" y="422.0" text-anchor="middle" class="kern2">output projection</text>
<rect x="727" y="380" width="250" height="62" rx="8" fill="#123b3a" stroke="#3f8f84" stroke-width="1.4"/><text x="852.0" y="408.0" text-anchor="middle" class="kern2">gate + up + SwiGLU</text><text x="852.0" y="422.0" text-anchor="middle" class="kern2">+ down (gated FFN)</text>
<rect x="313.0" y="374" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="485.0" y="374" width="8" height="74" rx="2" fill="#f2a05a"/>
<rect x="712.0" y="374" width="8" height="74" rx="2" fill="#f2a05a"/>
<text x="56" y="472" class="good">Same arithmetic, fewer stops &#183; 3 barriers/layer &#8776; 2 ms of bubbles/token &#183; the intermediate stays in registers, so no flush is needed</text>
<text x="56" y="508" class="subtitle">Weight bytes are identical in both rows. Fusion changes only how many times the layer stops to flush a cache line the next kernel is about to read.</text>
<rect x="56" y="560" width="1088" height="120" rx="10" fill="#16202f" stroke="#263548"/>
<text x="80" y="594" class="rowlab">Modeled decode throughput on one RX 9070 XT (Qwen3.5-9B, Q4_K_M)</text>
<line x1="90" y1="642" x2="1100" y2="642" stroke="#33465c" stroke-width="2"/>
<circle cx="520.0645161290323" cy="642" r="6" fill="#f2a8b8"/><text x="520.0645161290323" y="628" text-anchor="middle" fill="#f2a8b8" font-size="13" font-weight="720">39.6 start</text>
<circle cx="578.7096774193549" cy="642" r="6" fill="#e0c987"/><text x="578.7096774193549" y="668" text-anchor="middle" fill="#e0c987" font-size="13" font-weight="720">45 buffer reuse</text>
<circle cx="687.3118279569893" cy="642" r="6" fill="#8fe3a8"/><text x="687.3118279569893" y="628" text-anchor="middle" fill="#8fe3a8" font-size="13" font-weight="720">~55 + fusion</text>
<circle cx="1100.0" cy="642" r="6" fill="#8fb6e3"/><text x="1100.0" y="668" text-anchor="middle" fill="#8fb6e3" font-size="13" font-weight="720">93 streaming floor</text>
<rect x="620" y="536" width="16" height="12" rx="3" fill="#123b3a" stroke="#2f6f68"/><text x="642" y="547" class="leg">compute kernel</text>
<rect x="770" y="536" width="8" height="12" rx="2" fill="#f2a05a"/><text x="784" y="547" class="leg">pipeline barrier (L2 flush + L1 invalidate)</text>
</svg>