<line x1="60" y1="478" x2="482" y2="478" stroke="#bdb6a3" stroke-width="1.5"/>
<text class="t labs faint" x="60" y="496">hidden dimension channel →</text>
<text class="t labs faint" x="46" y="150">magnitude</text>
<text class="t labf faint" x="66" y="540">Vertical axis compressed; the spikes run far past the top of the panel.</text>
<path d="M138.9 146 L138.9 138 L403.3 138 L403.3 146" fill="none" stroke="#c8402c" stroke-width="1.4" stroke-dasharray="4 3"/>
<text class="t labs bold" fill="#c8402c" x="271.1" y="132" text-anchor="middle">outliers ≈ 0.1% of features</text>
<text class="t labs ink" x="196" y="262">a few fixed channels run</text>
<text class="t labs ink bold" x="196" y="279">10x to ~100,000x the median</text>
<text class="t labf soft" x="196" y="296">LLM.int8(), Massive Activations</text>
<text class="t labs soft" x="66" y="524">Weights, by contrast, fill a tight bell with no spike, so a single scale fits them.</text>
<text class="t ptitle ink" x="536" y="108">The cost of quantizing as if the spikes were not there</text>
<text class="t lab ink bold" x="560" y="186">Zero the 0.1% outlier features</text>
<rect x="560" y="196" width="360" height="50" fill="#c8402c" rx="3"/>
<text class="t labs bold" fill="#ffffff" x="572" y="217">perplexity +600 to 1000%</text>
<text class="t labs" fill="#fce8e2" x="572" y="235">top-1 attention mass −20%</text>
<text class="t lab ink bold" x="560" y="310">Zero a random 0.1% of features</text>
<rect x="560" y="320" width="16" height="50" fill="#1f7a82" rx="3"/>
<text class="t labs ink" x="586" y="351">negligible</text>
<line x1="560" y1="180" x2="560" y2="390" stroke="#bdb6a3" stroke-width="1.5"/>
<text class="t labs faint" x="560" y="412">relative damage to the model →</text>
<text class="t labs ink" x="536" y="468">Same count of features removed. The 0.1% that matters</text>
<text class="t labs ink" x="536" y="485">is the spiky 0.1%, which is why one low-bit scale fails:</text>
<text class="t labs ink bold" x="536" y="502">it spends its range on the giants and starves the field.</text>
<text class="t labf faint" x="40" y="580">Left bar heights are illustrative of the documented pattern; the degradation figures are measured in LLM.int8() on transformer language models.</text>
</svg>