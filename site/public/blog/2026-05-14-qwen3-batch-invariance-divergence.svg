    <rect class="bar-minor" x="18"  y="44" width="14" height="24"/>
    <rect class="bar-minor" x="36"  y="50" width="14" height="18"/>
    <rect class="bar-minor" x="54"  y="54" width="14" height="14"/>
    <rect class="bar-tail"  x="72"  y="58" width="14" height="10"/>
    <rect class="bar-tail"  x="90"  y="60" width="14" height="8"/>
    <rect class="bar-tail"  x="108" y="62" width="14" height="6"/>
    <rect class="bar-tail"  x="126" y="63" width="14" height="5"/>
    <rect class="bar-tail"  x="144" y="64" width="14" height="4"/>
