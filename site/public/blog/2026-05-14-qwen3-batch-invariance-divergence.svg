  <text class="label-dim" x="32" y="195">Tokens 1..102 are bit-identical across all 1000 completions. The first divergence lands at the 103rd token.</text>
  <text class="label-dim" x="32" y="210">Source: Thinking Machines Lab, "Defeating Nondeterminism in LLM Inference", September 2025.</text>

  <!-- Histogram of unique completions -->
