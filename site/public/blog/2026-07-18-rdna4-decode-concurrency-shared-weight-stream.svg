<text x="56" y="50" class="title">Weight streaming is the term a concurrent batch stops paying twice</text>
<text x="56" y="76" class="subtitle">Modeled decode step: Qwen3.5-9B Q4_K_M, one RX 9070 XT, ~2k context per sequence, post-fusion 18.0 ms baseline.</text>
