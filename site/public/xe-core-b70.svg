  <rect x="56" y="159" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="100" y="171" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="56" y="180" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="100" y="192" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 0 (DPAS)</text>

  <rect x="156" y="124" width="100" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
