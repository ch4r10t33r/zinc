<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
<title id="title">YaRN stretches Qwen3 RoPE frequencies, and applying it statically taxes every short prompt</title>
<desc id="desc">A two-panel data visualization on a deep petrol-teal background. Left: how YaRN stretches the RoPE frequency spectrum, with a native row of sine waves and a static YaRN factor four row whose high-frequency waves are preserved and low-frequency waves stretched four times. Right: the static tax, a line chart of effective rope scaling versus prompt length, with a flat static line at factor four and a length-aware line that stays at factor one until 32768 then ramps to four at 131072, the gap between them shaded as the tax.</desc>
