<text x="56" y="804" class="mark">RDNA4 WMMA tiles are 16x16x16, so batch 1 and batch 16 issue the same matrix instructions. The rows below 16 were padding.</text>
<text x="56" y="824" class="sub">Modeled from the measured 39.6 tok/s baseline and the post-fusion 18.0 ms budget. KV, LM-head matmul and sampling scale per sequence; weights, barriers and the LM-head weight read do not.</text>
