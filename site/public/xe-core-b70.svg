  <text x="206" y="153" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="162" y="159" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="206" y="171" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="162" y="180" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="206" y="192" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 1 (DPAS)</text>

  <rect x="262" y="124" width="100" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="312" y="140" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 2</text>
  <text x="312" y="153" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="268" y="159" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="312" y="171" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="268" y="180" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="312" y="192" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 2 (DPAS)</text>

  <rect x="368" y="124" width="92" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="414" y="140" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 3</text>
  <text x="414" y="153" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="374" y="159" width="80" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="414" y="171" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="374" y="180" width="80" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="414" y="192" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 3 (DPAS)</text>

  <!-- Row 1: XVE 4..7 -->
  <rect x="50" y="208" width="100" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="100" y="224" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 4</text>
  <text x="100" y="237" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="56" y="243" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="100" y="255" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="56" y="264" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="100" y="276" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 4 (DPAS)</text>

  <rect x="156" y="208" width="100" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="206" y="224" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 5</text>
  <text x="206" y="237" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="162" y="243" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="206" y="255" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="162" y="264" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="206" y="276" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 5 (DPAS)</text>

  <rect x="262" y="208" width="100" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="312" y="224" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 6</text>
  <text x="312" y="237" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="268" y="243" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="312" y="255" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="268" y="264" width="88" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="312" y="276" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 6 (DPAS)</text>

  <rect x="368" y="208" width="92" height="78" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="414" y="224" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 7</text>
  <text x="414" y="237" text-anchor="middle" fill="#c0b0a0" font-size="8">SIMD16/SIMD32 · 8 threads</text>
  <rect x="374" y="243" width="80" height="16" rx="3" fill="#3d2d1d" stroke="#e09060" stroke-width="1"/>
  <text x="414" y="255" text-anchor="middle" fill="#e09060" font-size="8" font-weight="600">GRF 128×64B / thread</text>
  <rect x="374" y="264" width="80" height="16" rx="3" fill="#3d2d1d" stroke="#d35400" stroke-width="1"/>
  <text x="414" y="276" text-anchor="middle" fill="#d35400" font-size="8" font-weight="600">XMX 7 (DPAS)</text>

  <!-- Send / load-store unit -->
  <rect x="50" y="294" width="410" height="34" rx="4" fill="#1a1210" stroke="#c0a080" stroke-width="1"/>
  <text x="255" y="310" text-anchor="middle" fill="#c0a080" font-size="10" font-weight="600">Load/Store Unit — send / sendc / sendsc / load_block2d</text>
  <text x="255" y="322" text-anchor="middle" fill="#a09080" font-size="8">Message-based memory ops · shared by 8 XVEs · coalescing &amp; cache routing</text>

  <!-- L1 cache -->
  <rect x="50" y="334" width="410" height="36" rx="4" fill="#1a1210" stroke="#b09070" stroke-width="1"/>
  <text x="255" y="350" text-anchor="middle" fill="#b09070" font-size="10" font-weight="600">L1 Cache — 256 KB · shared by 8 XVEs</text>
  <text x="255" y="364" text-anchor="middle" fill="#9a8a7a" font-size="8">Per-Xe-core · weight reuse for adjacent subgroups</text>

  <!-- SLM -->
  <rect x="50" y="376" width="410" height="40" rx="4" fill="#1a1210" stroke="#e09060" stroke-width="1"/>
  <text x="255" y="394" text-anchor="middle" fill="#e09060" font-size="10" font-weight="600">SLM — 128 KB · workgroup scratchpad</text>
  <text x="255" y="408" text-anchor="middle" fill="#a09080" font-size="8">Banked · broadcast free · barrier-synchronized · max 128 KB per workgroup</text>

  <!-- Thread-dispatch annotation -->
  <rect x="50" y="424" width="410" height="68" rx="6" fill="#1a1210" stroke="#5a4a3a" stroke-width="1"/>
  <text x="255" y="442" text-anchor="middle" fill="#e8dcd0" font-size="10" font-weight="600">Per-Xe-core Capacity</text>
  <text x="62" y="460" fill="#c0b0a0" font-size="9">Hardware threads (regular GRF)</text>
  <text x="448" y="460" text-anchor="end" fill="#e8722a" font-size="9">64 (8 XVE × 8)</text>
  <text x="62" y="475" fill="#c0b0a0" font-size="9">Hardware threads (large GRF)</text>
  <text x="448" y="475" text-anchor="end" fill="#e8a060" font-size="9">32 (8 XVE × 4)</text>
  <text x="62" y="488" fill="#c0b0a0" font-size="9">GRF total per Xe core</text>
  <text x="448" y="488" text-anchor="end" fill="#e09060" font-size="9">≈ 512 KB</text>

  <!-- Xe Cores 1-3 (abbreviated) -->
  <rect x="478" y="80" width="362" height="135" rx="8" fill="none" stroke="#5a4a3a" stroke-width="1"/>
  <text x="659" y="100" text-anchor="middle" fill="#c0b0a0" font-size="12" font-weight="600">Xe Core 1</text>

  <rect x="490" y="110" width="170" height="48" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="575" y="128" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 0–3</text>
  <text x="575" y="145" text-anchor="middle" fill="#c0b0a0" font-size="8">GRF · XMX paired 1:1</text>

  <rect x="665" y="110" width="170" height="48" rx="5" fill="#1a1210" stroke="#e8722a" stroke-width="1.3"/>
  <text x="750" y="128" text-anchor="middle" fill="#e8722a" font-size="10" font-weight="600">XVE 4–7</text>
  <text x="750" y="145" text-anchor="middle" fill="#c0b0a0" font-size="8">GRF · XMX paired 1:1</text>

  <rect x="490" y="166" width="345" height="20" rx="3" fill="#1a1210" stroke="#b09070" stroke-width="1"/>
  <text x="662" y="180" text-anchor="middle" fill="#b09070" font-size="9">L1 256 KB</text>

  <rect x="490" y="190" width="345" height="20" rx="3" fill="#1a1210" stroke="#e09060" stroke-width="1"/>
  <text x="662" y="204" text-anchor="middle" fill="#e09060" font-size="9">SLM 128 KB</text>

  <!-- Xe Core 2 -->
  <rect x="478" y="220" width="362" height="78" rx="8" fill="none" stroke="#5a4a3a" stroke-width="1"/>
  <text x="492" y="238" fill="#c0b0a0" font-size="11" font-weight="600">Xe Core 2</text>
  <rect x="492" y="248" width="335" height="20" rx="3" fill="#1a1210" stroke="#e8722a" stroke-width="1"/>
  <text x="659" y="262" text-anchor="middle" fill="#e8722a" font-size="9">8 XVE + 8 XMX</text>
  <rect x="492" y="272" width="335" height="20" rx="3" fill="#1a1210" stroke="#b09070" stroke-width="1"/>
  <text x="659" y="286" text-anchor="middle" fill="#b09070" font-size="9">L1 256 KB · SLM 128 KB</text>

  <!-- Xe Core 3 -->
  <rect x="478" y="302" width="362" height="78" rx="8" fill="none" stroke="#5a4a3a" stroke-width="1"/>
  <text x="492" y="320" fill="#c0b0a0" font-size="11" font-weight="600">Xe Core 3</text>
  <rect x="492" y="330" width="335" height="20" rx="3" fill="#1a1210" stroke="#e8722a" stroke-width="1"/>
  <text x="659" y="344" text-anchor="middle" fill="#e8722a" font-size="9">8 XVE + 8 XMX</text>
  <rect x="492" y="354" width="335" height="20" rx="3" fill="#1a1210" stroke="#b09070" stroke-width="1"/>
  <text x="659" y="368" text-anchor="middle" fill="#b09070" font-size="9">L1 256 KB · SLM 128 KB</text>

  <!-- Instruction throughput panel (right side, lower) -->
  <rect x="478" y="386" width="362" height="106" rx="6" fill="#1a1210" stroke="#5a4a3a" stroke-width="1"/>
  <text x="659" y="404" text-anchor="middle" fill="#e8dcd0" font-size="11" font-weight="600">B70 Throughput Reference</text>

  <text x="492" y="424" fill="#c0b0a0" font-size="9">FP32 vector (XVE total)</text>
  <text x="828" y="424" text-anchor="end" fill="#e8722a" font-size="9">22.94 TFLOPS</text>

  <text x="492" y="438" fill="#c0b0a0" font-size="9">FP16 / BF16 via XMX</text>
  <text x="828" y="438" text-anchor="end" fill="#d35400" font-size="9">~184 TFLOPS</text>

  <text x="492" y="452" fill="#c0b0a0" font-size="9">INT8 via XMX (DPAS)</text>
  <text x="828" y="452" text-anchor="end" fill="#d35400" font-size="9">367 TOPS</text>

  <text x="492" y="466" fill="#c0b0a0" font-size="9">Graphics clock</text>
  <text x="828" y="466" text-anchor="end" fill="#c0a080" font-size="9">2280 MHz</text>

  <text x="492" y="480" fill="#c0b0a0" font-size="9">SLM access (cross-subgroup)</text>
  <text x="828" y="480" text-anchor="end" fill="#e09060" font-size="9">1 barrier + load</text>

  <!-- Shared L2 -->
  <rect x="35" y="510" width="810" height="44" rx="6" fill="#1a1210" stroke="#c08060" stroke-width="1.5"/>
  <text x="440" y="530" text-anchor="middle" fill="#c08060" font-size="12" font-weight="600">L2 Cache — shared last-level GPU cache · driver-reported sizing</text>
  <text x="440" y="546" text-anchor="middle" fill="#a09080" font-size="9">Working sets that fit in L2 amplify effective bandwidth above the 608 GB/s VRAM spec</text>

  <!-- VRAM -->
  <rect x="35" y="562" width="810" height="40" rx="6" fill="#1a1210" stroke="#7a6050" stroke-width="1"/>
  <text x="440" y="580" text-anchor="middle" fill="#7a6050" font-size="11" font-weight="600">GDDR6 VRAM — 32 GB · 256-bit · 608 GB/s</text>
  <text x="440" y="594" text-anchor="middle" fill="#9a8a7a" font-size="8">Resizable BAR required for B-series benchmark nodes · PCIe 5.0 x16 host link</text>

  <!-- B70 totals -->
  <rect x="35" y="610" width="810" height="40" rx="6" fill="#3d2d1d" stroke="#5a4a3a" stroke-width="1"/>
  <text x="440" y="628" text-anchor="middle" fill="#e8dcd0" font-size="10" font-weight="600">B70 Totals: 8 Render Slices · 32 Xe Cores · 256 XVE · 256 XMX · 2048 HW Threads · 4 MB SLM · 8 MB L1</text>
  <text x="440" y="642" text-anchor="middle" fill="#c0b0a0" font-size="9">Mental-model shift from RDNA: subgroup width (SIMD16/32) is compiler-vectorized, not a wave64 wired into the ISA</text>
</svg>
