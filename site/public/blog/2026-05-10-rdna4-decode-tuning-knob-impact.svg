<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial">
  <title id="title">What moves RDNA4 dense Qwen3 decode and what doesn't, on a Radeon AI PRO R9700</title>
  <desc id="desc">A vertical bar chart comparing the measured impact of six tuning interventions on dense Qwen3.5-27B Q4_K_M decode tokens per second on the AMD Radeon AI PRO R9700 (gfx1201, RDNA4) under llama.cpp with the Vulkan RADV backend. The baseline at the left is the stock build at 29.30 tokens per second, drawn in dark gray. Four neutral interventions follow, each drawn in the same dark gray to indicate near-zero impact: increasing the micro-batch with the flag minus ub 2048 lands at 29.01, applying the small rm_kq equals 1 source patch lands at 29.31, writing COMPUTE to pp_power_profile_mode lands at 29.30, and forcing power_dpm_force_performance_level to profile_peak also lands at 29.30. The rightmost bar is drawn taller and filled solid green: setting pcie_aspm.policy to performance jumps decode to 32.46 tokens per second, a roughly 10.8 percent gain. A horizontal dashed orange reference line at 29.30 marks the stock baseline so the reader can see at a glance that only the PCIe knob clears it. A small inset on the right shows a per-decode-step timeline with three doorbell transactions over PCIe, each followed by an L1 exit latency strip; an arrow labels the strip as the tax that ASPM performance mode removes. A header explains that this is dense decode, that MoE decode is unaffected, and that PCIe ASPM resets to its kernel default on every reboot. A footer cites the llama.cpp RDNA4 Llama Experiments discussion as the source of the measurements.</desc>

  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="winnerBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5dbb89"/>
      <stop offset="100%" stop-color="#2d7a4f"/>
    </linearGradient>
    <linearGradient id="neutralBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4865"/>
      <stop offset="100%" stop-color="#222d44"/>
    </linearGradient>
    <linearGradient id="baselineBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c5b78"/>
      <stop offset="100%" stop-color="#2c3a55"/>
    </linearGradient>
    <linearGradient id="insetBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3eb1c8"/>
      <stop offset="100%" stop-color="#2a8aa0"/>
    </linearGradient>
  </defs>

  <rect width="940" height="600" fill="url(#bgFade)"/>

  <!-- Header -->
  <text x="22" y="34" fill="#e8edf5" font-size="19" font-weight="700">What moves RDNA4 dense Qwen3 decode, and what doesn't</text>
  <text x="22" y="54" fill="#8ea0b8" font-size="12.5">Radeon AI PRO R9700, Qwen3.5-27B Q4_K_M, llama.cpp Vulkan RADV. Baseline 29.30 tok/s. Only one knob clears the line.</text>

  <!-- Y-axis label -->
  <text x="60" y="100" fill="#c8d1e0" font-size="11" font-weight="700" letter-spacing="0.6">DECODE TOK/S</text>

  <!-- Chart area: x from 70 to 640, y from 110 (top, ~34 tok/s) to 470 (bottom, 0) -->
  <!-- Y scale: 360 px / 34 tok/s = 10.588 px per tok/s -->

  <!-- Y-axis grid lines and labels -->
  <g stroke="#1d2b48" stroke-width="1">
    <line x1="70" y1="470" x2="640" y2="470"/>
    <line x1="70" y1="364" x2="640" y2="364"/>
    <line x1="70" y1="258" x2="640" y2="258"/>
    <line x1="70" y1="152" x2="640" y2="152"/>
  </g>
  <g fill="#5b6b85" font-size="10" text-anchor="end">
    <text x="62" y="473">0</text>
    <text x="62" y="367">10</text>
    <text x="62" y="261">20</text>
    <text x="62" y="155">30</text>
  </g>

  <!-- Baseline reference at 29.30 tok/s: y = 470 - 29.30*10.588 = 470 - 310.2 = 159.8 -->
  <line x1="70" y1="160" x2="640" y2="160" stroke="#f4a261" stroke-width="1" stroke-dasharray="4,3" opacity="0.65"/>
  <text x="78" y="156" fill="#f4a261" font-size="10">29.30 tok/s · stock baseline</text>

  <!-- Bars: each bar is 65 px wide, gaps of 25 px. x positions: 95, 185, 275, 365, 455, 545 -->

  <!-- Bar 1: stock = 29.30, y=160, h=310 -->
  <rect x="95" y="160" width="65" height="310" fill="url(#baselineBar)" rx="2"/>
  <text x="127" y="155" fill="#a6b3c8" font-size="11" text-anchor="middle" font-weight="600">29.30</text>
  <text x="127" y="488" fill="#c8d1e0" font-size="11" text-anchor="middle" font-weight="600">stock</text>
  <text x="127" y="503" fill="#8ea0b8" font-size="10" text-anchor="middle">RADV defaults</text>

  <!-- Bar 2: -ub 2048 = 29.01, y=470 - 307.16 = 162.84, h=307 -->
  <rect x="185" y="163" width="65" height="307" fill="url(#neutralBar)" rx="2"/>
  <text x="217" y="158" fill="#7f8ca6" font-size="11" text-anchor="middle" font-weight="600">29.01 <tspan fill="#5b6b85" font-size="9.5">(−1%)</tspan></text>
  <text x="217" y="488" fill="#c8d1e0" font-size="11" text-anchor="middle" font-weight="600">-ub 2048</text>
  <text x="217" y="503" fill="#8ea0b8" font-size="10" text-anchor="middle">micro-batch flag</text>

  <!-- Bar 3: rm_kq=1 = 29.31, y=160, h=310 -->
  <rect x="275" y="160" width="65" height="310" fill="url(#neutralBar)" rx="2"/>
  <text x="307" y="155" fill="#7f8ca6" font-size="11" text-anchor="middle" font-weight="600">29.31 <tspan fill="#5b6b85" font-size="9.5">(0%)</tspan></text>
  <text x="307" y="488" fill="#c8d1e0" font-size="11" text-anchor="middle" font-weight="600">rm_kq=1</text>
  <text x="307" y="503" fill="#8ea0b8" font-size="10" text-anchor="middle">one-line patch</text>

  <!-- Bar 4: COMPUTE profile = 29.30, y=160, h=310 -->
  <rect x="365" y="160" width="65" height="310" fill="url(#neutralBar)" rx="2"/>
  <text x="397" y="155" fill="#7f8ca6" font-size="11" text-anchor="middle" font-weight="600">29.30 <tspan fill="#5b6b85" font-size="9.5">(0%)</tspan></text>
  <text x="397" y="488" fill="#c8d1e0" font-size="11" text-anchor="middle" font-weight="600">COMPUTE</text>
  <text x="397" y="503" fill="#8ea0b8" font-size="10" text-anchor="middle">power profile</text>

  <!-- Bar 5: profile_peak = 29.30, y=160, h=310 -->
  <rect x="455" y="160" width="65" height="310" fill="url(#neutralBar)" rx="2"/>
  <text x="487" y="155" fill="#7f8ca6" font-size="11" text-anchor="middle" font-weight="600">29.30 <tspan fill="#5b6b85" font-size="9.5">(0%)</tspan></text>
  <text x="487" y="488" fill="#c8d1e0" font-size="11" text-anchor="middle" font-weight="600">profile_peak</text>
  <text x="487" y="503" fill="#8ea0b8" font-size="10" text-anchor="middle">forced max sclk</text>

  <!-- Bar 6: pcie_aspm performance = 32.46, y=470 - 343.69 = 126.3, h=343.7 -->
  <rect x="545" y="126" width="65" height="344" fill="url(#winnerBar)" rx="2"/>
  <text x="577" y="121" fill="#5dbb89" font-size="11.5" text-anchor="middle" font-weight="700">32.46 <tspan fill="#3f9b6b" font-size="10">(+10.8%)</tspan></text>
  <text x="577" y="488" fill="#5dbb89" font-size="11" text-anchor="middle" font-weight="700">pcie_aspm</text>
  <text x="577" y="503" fill="#5dbb89" font-size="10" text-anchor="middle">policy=performance</text>

  <!-- Annotation arrow from PCIe bar to inset -->
  <path d="M 615 200 Q 655 180 695 195" stroke="#5dbb89" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <polygon points="690,189 700,195 690,201" fill="#5dbb89"/>

  <!-- Inset: per-decode-step PCIe timeline. Frame at x=665 to x=915, y=130 to y=370 -->
  <rect x="665" y="130" width="250" height="240" fill="#0c1424" stroke="#1d2b48" stroke-width="1" rx="4"/>
  <text x="790" y="152" fill="#c8d1e0" font-size="11.5" text-anchor="middle" font-weight="700">Where the tax lives</text>
  <text x="790" y="168" fill="#8ea0b8" font-size="10" text-anchor="middle">one decode step, PCIe link state</text>

  <!-- Timeline axis -->
  <line x1="685" y1="220" x2="900" y2="220" stroke="#3a4865" stroke-width="1.5"/>
  <text x="685" y="240" fill="#5b6b85" font-size="9" text-anchor="start">t</text>
  <text x="900" y="240" fill="#5b6b85" font-size="9" text-anchor="end">t + ~34 ms</text>

  <!-- Doorbell transactions (blue triangles above the line) and L1 exit strips (red below) -->
  <!-- Transaction 1 at x=710 -->
  <polygon points="710,215 705,205 715,205" fill="#3eb1c8"/>
  <rect x="710" y="222" width="22" height="6" fill="#e85d75" opacity="0.85"/>
  <!-- Transaction 2 at x=775 -->
  <polygon points="775,215 770,205 780,205" fill="#3eb1c8"/>
  <rect x="775" y="222" width="22" height="6" fill="#e85d75" opacity="0.85"/>
  <!-- Transaction 3 at x=840 -->
  <polygon points="840,215 835,205 845,205" fill="#3eb1c8"/>
  <rect x="840" y="222" width="22" height="6" fill="#e85d75" opacity="0.85"/>

  <!-- Inset legend -->
  <g font-size="9.5">
    <polygon points="690,260 685,250 695,250" fill="#3eb1c8"/>
    <text x="702" y="259" fill="#c8d1e0">doorbell write to GPU command processor</text>

    <rect x="685" y="273" width="10" height="6" fill="#e85d75" opacity="0.85"/>
    <text x="702" y="280" fill="#c8d1e0">L1 exit latency · removed by performance policy</text>

    <text x="685" y="305" fill="#8ea0b8">several dozen layers × multiple</text>
    <text x="685" y="319" fill="#8ea0b8">dispatches = hundreds per token.</text>
    <text x="685" y="338" fill="#8ea0b8">Dense decode pays once per dispatch.</text>
    <text x="685" y="352" fill="#8ea0b8">MoE batches them and hides the tax.</text>
  </g>

  <!-- Footer -->
  <rect x="22" y="540" width="896" height="40" fill="#0c1424" stroke="#1d2b48" stroke-width="1" rx="3"/>
  <text x="32" y="558" fill="#c8d1e0" font-size="10.5">Source: llama.cpp Discussion #21043, "RDNA4 Llama Experiments". One-line system command, no code change, no driver change.</text>
  <text x="32" y="572" fill="#5b6b85" font-size="10">echo performance &gt; /sys/module/pcie_aspm/parameters/policy   ·   resets to kernel default at every reboot unless pinned via pcie_aspm.policy=performance on the kernel command line</text>
</svg>
