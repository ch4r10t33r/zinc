<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1724"/><stop offset="1" stop-color="#18251f"/></linearGradient>
    <linearGradient id="vram" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff7b6b" stop-opacity="0.16"/><stop offset="1" stop-color="#ff7b6b" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="lds" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3ddc97" stop-opacity="0.16"/><stop offset="1" stop-color="#3ddc97" stop-opacity="0.05"/></linearGradient>
    <marker id="red" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ff7b6b"/></marker>
    <marker id="cyan" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#38d7ff"/></marker>
    <marker id="grn" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3ddc97"/></marker>
    <style>
      .title{fill:#f6fbff;font-size:31px;font-weight:780}
      .subtitle{fill:#aebdcc;font-size:15px}
      .rowlabel{fill:#c7d4e2;font-size:17px;font-weight:720}
      .kernel{fill:#132133;stroke:#38d7ff;stroke-width:2}
      .kernellabel{fill:#eaf4ff;font-size:15px;font-weight:680}
      .ksub{fill:#8fa2b6;font-size:12px}
      .vramlane{fill:url(#vram);stroke:#7a3b36;stroke-width:1.5}
      .ldsbox{fill:url(#lds);stroke:#2f8f66;stroke-width:2}
      .vramtxt{fill:#f2b8ac;font-size:15px;font-weight:700}
      .ldstxt{fill:#8ff0c4;font-size:15px;font-weight:700}
      .flow{fill:none;stroke:#5a6b7e;stroke-width:2}
      .redarrow{fill:none;stroke:#ff7b6b;stroke-width:2.2}
      .grnarrow{fill:none;stroke:#3ddc97;stroke-width:2.2}
      .bytelab{fill:#f2b8ac;font-size:11px;font-weight:640}
      .io{fill:#ffd86b;font-size:14px;font-weight:740}
      .total{fill:#ffd86b;font-size:16px;font-weight:820}
      .pill{fill:#101d2c;stroke:#33465b;stroke-width:1}
      .pilltxt{fill:#cdd9e6;font-size:13px}
    </style>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>

  <text x="56" y="54" class="title">The SwiGLU intermediate is the widest tensor ZINC spills to VRAM</text>
  <text x="56" y="82" class="subtitle">Qwen3.5-9B MLP block, 256-token prefill tile on the RX 9070 XT. Intermediate width 11008 = 2.7x the 4096 hidden state.</text>
  <text x="56" y="103" class="subtitle">Each intermediate-width crossing moves ~21.5 KB per token. First-order model.</text>

  <!-- ============ TOP ROW: STAGED ============ -->
  <text x="56" y="150" class="rowlabel">Staged: four dispatches, intermediate lives in VRAM</text>

  <!-- input pill -->
  <rect x="56" y="196" width="70" height="46" rx="8" class="pill"/>
  <text x="91" y="218" text-anchor="middle" class="io">x</text>
  <text x="91" y="234" text-anchor="middle" class="pilltxt">4096</text>

  <!-- kernels row (top) y=176..252 -->
  <!-- gate GEMM -->
  <rect x="176" y="176" width="150" height="66" rx="10" class="kernel"/>
  <text x="251" y="205" text-anchor="middle" class="kernellabel">gate GEMM</text>
  <text x="251" y="226" text-anchor="middle" class="ksub">Q4_K x, up to 11008</text>
  <!-- up GEMM -->
  <rect x="360" y="176" width="150" height="66" rx="10" class="kernel"/>
  <text x="435" y="205" text-anchor="middle" class="kernellabel">up GEMM</text>
  <text x="435" y="226" text-anchor="middle" class="ksub">Q4_K x, up to 11008</text>
  <!-- SwiGLU -->
  <rect x="544" y="176" width="150" height="66" rx="10" class="kernel"/>
  <text x="619" y="205" text-anchor="middle" class="kernellabel">SwiGLU</text>
  <text x="619" y="226" text-anchor="middle" class="ksub">silu(gate) * up</text>
  <!-- down GEMM -->
  <rect x="728" y="176" width="150" height="66" rx="10" class="kernel"/>
  <text x="803" y="205" text-anchor="middle" class="kernellabel">down GEMM</text>
  <text x="803" y="226" text-anchor="middle" class="ksub">11008 to 4096</text>

  <!-- input flow -->
  <path d="M126,219 H176" class="flow" marker-end="url(#cyan)"/>

  <!-- VRAM lane (top) -->
  <rect x="176" y="320" width="702" height="40" rx="6" class="vramlane"/>
  <text x="527" y="345" text-anchor="middle" class="vramtxt">VRAM  (intermediate-width buffers, 5.6 MB each)</text>

  <!-- crossings: writes (down) and reads (up), red -->
  <!-- gate write -->
  <path d="M235,242 V320" class="redarrow" marker-end="url(#red)"/>
  <text x="228" y="292" text-anchor="end" class="bytelab">write 21.5K</text>
  <!-- up write -->
  <path d="M419,242 V320" class="redarrow" marker-end="url(#red)"/>
  <text x="412" y="292" text-anchor="end" class="bytelab">write 21.5K</text>
  <!-- swiglu reads gate + up (two up-into-swiglu) -->
  <path d="M300,320 V242" class="redarrow" marker-end="url(#red)"/>
  <text x="308" y="308" class="bytelab">read</text>
  <path d="M580,320 V242" class="redarrow" marker-end="url(#red)"/>
  <text x="588" y="308" class="bytelab">read x2</text>
  <!-- swiglu write h -->
  <path d="M655,242 V320" class="redarrow" marker-end="url(#red)"/>
  <text x="663" y="292" class="bytelab">write 21.5K</text>
  <!-- down read h -->
  <path d="M790,320 V242" class="redarrow" marker-end="url(#red)"/>
  <text x="798" y="308" class="bytelab">read 21.5K</text>

  <!-- output -->
  <path d="M878,219 H930" class="flow" marker-end="url(#cyan)"/>
  <rect x="930" y="196" width="86" height="46" rx="8" class="pill"/>
  <text x="973" y="218" text-anchor="middle" class="io">output</text>
  <text x="973" y="234" text-anchor="middle" class="pilltxt">4096</text>

  <!-- total -->
  <text x="1035" y="343" class="total">6 crossings</text>
  <text x="1035" y="365" class="total">~129 KB/token</text>

  <!-- ============ divider ============ -->
  <line x1="56" y1="428" x2="1144" y2="428" stroke="#233247" stroke-dasharray="3 7"/>

  <!-- ============ BOTTOM ROW: FUSED ============ -->
  <text x="56" y="486" class="rowlabel">Fused: one dispatch, intermediate stays in the LDS</text>

  <!-- input pill -->
  <rect x="56" y="560" width="70" height="46" rx="8" class="pill"/>
  <text x="91" y="582" text-anchor="middle" class="io">x</text>
  <text x="91" y="598" text-anchor="middle" class="pilltxt">4096</text>
  <path d="M126,583 H196" class="flow" marker-end="url(#grn)"/>

  <!-- fused kernel outer -->
  <rect x="196" y="520" width="620" height="128" rx="12" fill="#101d2c" stroke="#3ddc97" stroke-width="2.2"/>
  <text x="506" y="546" text-anchor="middle" class="kernellabel">fused MLP kernel  (gate + up + SwiGLU + down, streamed over K)</text>

  <!-- LDS box inside -->
  <rect x="228" y="560" width="556" height="66" rx="9" class="ldsbox"/>
  <text x="506" y="588" text-anchor="middle" class="ldstxt">LDS: intermediate strip produced and consumed on-chip</text>
  <text x="506" y="610" text-anchor="middle" class="ksub">gate/up WMMA tiles to LDS to SwiGLU to down accumulation, no VRAM round trip</text>

  <!-- output -->
  <path d="M816,583 H886" class="flow" marker-end="url(#grn)"/>
  <rect x="886" y="560" width="86" height="46" rx="8" class="pill"/>
  <text x="929" y="582" text-anchor="middle" class="io">output</text>
  <text x="929" y="598" text-anchor="middle" class="pilltxt">4096</text>

  <!-- ghost VRAM lane, unused -->
  <rect x="228" y="672" width="556" height="30" rx="6" fill="none" stroke="#33465b" stroke-dasharray="4 6"/>
  <text x="506" y="692" text-anchor="middle" class="pilltxt">VRAM: only hidden-width x in and output out cross this line</text>

  <text x="1000" y="583" class="total">0 wide</text>
  <text x="1000" y="605" class="total">crossings</text>

  <!-- legend -->
  <line x1="360" y1="770" x2="392" y2="770" class="redarrow" marker-end="url(#red)"/>
  <text x="400" y="775" class="pilltxt">intermediate-width VRAM traffic (2.7x hidden)</text>
  <rect x="742" y="762" width="16" height="16" rx="3" class="ldsbox"/>
  <text x="766" y="775" class="pilltxt">on-chip LDS (no VRAM round trip)</text>
</svg>
