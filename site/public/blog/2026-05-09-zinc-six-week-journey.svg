<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial">
  <title id="title">Six-week zinc RDNA4 Qwen journey, March 27 to May 10 2026</title>
  <desc id="desc">A milestone timeline for zinc on AMD RDNA4 from March 27 to May 10 2026. It does not plot one continuous throughput metric because the model family and benchmark target changed during the work. The milestones are: March 27, 97 percent zero logits and about 0.8 tokens per second while debugging Qwen3.5; March 30, 33.58 tokens per second plain decode on Qwen3.5 after memory and dispatch cleanup; April 5, Qwen 3 added MoE plus gated DeltaNet work; April 26, prefill gap named at 90.24 tokens per second in zinc versus about 180 in llama.cpp with SSM at 925 milliseconds of a 2,110 millisecond phase profile; May 1, long-prefill buckets identified as MoE grouping, attention shape, SSM state, and cache reuse; May 6, prefix KV reuse became a serving primitive; May 10, the published Qwen3.6 artifact showed zinc decode at 117.07 tokens per second versus llama.cpp at 104.47, while zinc prefill remained 88.08 versus 181.95.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5dbb89"/>
      <stop offset="100%" stop-color="#2d8f61"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#c97f3a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d5bd0"/>
    </linearGradient>
  </defs>

  <rect width="940" height="500" fill="url(#bg)"/>

  <text x="36" y="38" fill="#e8edf5" font-size="20" font-weight="700">Six weeks of AMD Qwen work on RDNA4</text>
  <text x="36" y="61" fill="#8ea0b8" font-size="13">A milestone timeline, not one continuous benchmark: the model and the bottleneck changed under the engine.</text>

  <line x1="70" y1="246" x2="870" y2="246" stroke="#2b3c5f" stroke-width="2"/>
  <g fill="#5b6b85" font-size="10" text-anchor="middle">
    <text x="70" y="276">Mar 27</text>
    <text x="203" y="276">Mar 30</text>
    <text x="336" y="276">Apr 5</text>
    <text x="469" y="276">Apr 26</text>
    <text x="602" y="276">May 1</text>
    <text x="735" y="276">May 6</text>
    <text x="870" y="276">May 10</text>
  </g>

  <g stroke="#2b3c5f" stroke-width="1.4">
    <line x1="70" y1="206" x2="70" y2="286"/>
    <line x1="203" y1="206" x2="203" y2="286"/>
    <line x1="336" y1="206" x2="336" y2="286"/>
    <line x1="469" y1="206" x2="469" y2="286"/>
    <line x1="602" y1="206" x2="602" y2="286"/>
    <line x1="735" y1="206" x2="735" y2="286"/>
    <line x1="870" y1="206" x2="870" y2="286"/>
  </g>

  <g>
    <circle cx="70" cy="246" r="8" fill="#e85d75"/>
    <rect x="30" y="104" width="176" height="96" rx="7" fill="#171427" stroke="#e85d75"/>
    <text x="48" y="130" fill="#f7a8b6" font-size="12" font-weight="700">correctness first</text>
    <text x="48" y="153" fill="#c8d1e0" font-size="18" font-weight="800">97% zero logits</text>
    <text x="48" y="175" fill="#8ea0b8" font-size="11">~0.8 tok/s, mostly wrong</text>
    <text x="48" y="190" fill="#8ea0b8" font-size="11">Qwen3.5 bring-up</text>
  </g>

  <g>
    <circle cx="203" cy="246" r="8" fill="#5dbb89"/>
    <rect x="162" y="308" width="174" height="96" rx="7" fill="#112134" stroke="#5dbb89"/>
    <text x="180" y="334" fill="#9ddcb6" font-size="12" font-weight="700">first real baseline</text>
    <text x="180" y="357" fill="#c8d1e0" font-size="18" font-weight="800">33.58 tok/s</text>
    <text x="180" y="379" fill="#8ea0b8" font-size="11">plain decode on Qwen3.5</text>
    <text x="180" y="394" fill="#8ea0b8" font-size="11">memory + dispatch cleanup</text>
  </g>

  <g>
    <circle cx="336" cy="246" r="8" fill="#a78bfa"/>
    <rect x="294" y="104" width="174" height="96" rx="7" fill="#19152b" stroke="#a78bfa"/>
    <text x="312" y="130" fill="#cdbdff" font-size="12" font-weight="700">target changed</text>
    <text x="312" y="153" fill="#c8d1e0" font-size="18" font-weight="800">MoE + GDN</text>
    <text x="312" y="175" fill="#8ea0b8" font-size="11">Qwen 3 was not Llama</text>
    <text x="312" y="190" fill="#8ea0b8" font-size="11">routing, SSM, cache shape</text>
  </g>

  <g>
    <circle cx="469" cy="246" r="8" fill="#f4a261"/>
    <rect x="428" y="308" width="188" height="96" rx="7" fill="#26180e" stroke="#f4a261"/>
    <text x="446" y="334" fill="#f4d9c3" font-size="12" font-weight="700">prefill gap named</text>
    <text x="446" y="357" fill="#c8d1e0" font-size="18" font-weight="800">90.24 vs ~180</text>
    <text x="446" y="379" fill="#8ea0b8" font-size="11">Qwen3.5 prefill snapshot</text>
    <text x="446" y="394" fill="#8ea0b8" font-size="11">SSM: 925 ms of 2,110 ms</text>
  </g>

  <g>
    <circle cx="602" cy="246" r="8" fill="#3eb1c8"/>
    <rect x="560" y="104" width="174" height="96" rx="7" fill="#0f2330" stroke="#3eb1c8"/>
    <text x="578" y="130" fill="#9ee8f3" font-size="12" font-weight="700">profile got specific</text>
    <text x="578" y="153" fill="#c8d1e0" font-size="18" font-weight="800">named buckets</text>
    <text x="578" y="175" fill="#8ea0b8" font-size="11">MoE grouping, attention</text>
    <text x="578" y="190" fill="#8ea0b8" font-size="11">SSM state, cache reuse</text>
  </g>

  <g>
    <circle cx="735" cy="246" r="8" fill="#5dbb89"/>
    <rect x="694" y="308" width="174" height="96" rx="7" fill="#112134" stroke="#5dbb89"/>
    <text x="712" y="334" fill="#9ddcb6" font-size="12" font-weight="700">serving primitive</text>
    <text x="712" y="357" fill="#c8d1e0" font-size="18" font-weight="800">prefix KV reuse</text>
    <text x="712" y="379" fill="#8ea0b8" font-size="11">avoid repeated prefix work</text>
    <text x="712" y="394" fill="#8ea0b8" font-size="11">chat cache semantics</text>
  </g>

  <g>
    <circle cx="870" cy="246" r="10" fill="url(#green)" stroke="#9ddcb6" stroke-width="2"/>
    <rect x="746" y="96" width="184" height="112" rx="8" fill="#10251d" stroke="#5dbb89"/>
    <text x="764" y="122" fill="#9ddcb6" font-size="12" font-weight="700">published artifact</text>
    <text x="764" y="146" fill="#c8d1e0" font-size="18" font-weight="800">117.07 vs 104.47</text>
    <text x="764" y="168" fill="#8ea0b8" font-size="11">Qwen3.6 decode crossed</text>
    <text x="764" y="183" fill="#8ea0b8" font-size="11">prefill: 88.08 vs 181.95</text>
    <text x="764" y="198" fill="#8ea0b8" font-size="11">same RDNA node, same GGUF</text>
  </g>

  <rect x="36" y="430" width="868" height="48" rx="7" fill="#0a1020" stroke="#1d2b48"/>
  <text x="54" y="451" fill="#8ea0b8" font-size="11">Early numbers are journey checkpoints, not the May 10 suite.</text>
  <text x="54" y="468" fill="#8ea0b8" font-size="11">The supported current claim is decode 117.07 vs 104.47, with prefill still behind at 88.08 vs 181.95.</text>
</svg>
