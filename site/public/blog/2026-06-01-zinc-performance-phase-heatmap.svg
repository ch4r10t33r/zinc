<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#18251f"/>
    </linearGradient>
    <style>
      .cellText { fill: #07111d; font-size: 20px; font-weight: 800; text-anchor: middle; dominant-baseline: central; }
      .small { fill: #aebdcc; font-size: 12px; }
      .label { fill: #f4f7fb; font-size: 15px; font-weight: 700; }
      .sub { fill: #aebdcc; font-size: 12px; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="52" y="58" fill="#f7fbff" font-size="30" font-weight="760">Percent of llama.cpp is not one number</text>
  <text x="52" y="90" fill="#aebdcc" font-size="15">The same run can win decode, lose prefill, and still lose the full harness wall clock.</text>
  <text x="52" y="112" fill="#aebdcc" font-size="15">Cells show ZINC as a percent of the same-file llama.cpp baseline.</text>

  <g transform="translate(52,132)">
    <rect x="0" y="0" width="1096" height="560" rx="8" fill="#0f1724" stroke="#344458"/>

    <text x="30" y="42" class="small">Target / model</text>
    <text x="570" y="42" class="small" text-anchor="middle">Decode</text>
    <text x="760" y="42" class="small" text-anchor="middle">Prefill</text>
    <text x="950" y="42" class="small" text-anchor="middle">End-to-end</text>

    <!-- Legend -->
    <g transform="translate(30,500)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#4ee6a6"/>
      <text x="26" y="14" fill="#aebdcc" font-size="12">100%+ of llama.cpp</text>
      <rect x="180" y="0" width="18" height="18" rx="3" fill="#ffcf77"/>
      <text x="206" y="14" fill="#aebdcc" font-size="12">60-99%</text>
      <rect x="290" y="0" width="18" height="18" rx="3" fill="#ff8f70"/>
      <text x="316" y="14" fill="#aebdcc" font-size="12">30-59%</text>
      <rect x="400" y="0" width="18" height="18" rx="3" fill="#ff647d"/>
      <text x="426" y="14" fill="#aebdcc" font-size="12">below 30%</text>
    </g>

    <!-- Row helper: labels at x 30, cells x 500/690/880 width 150 height 52 -->
    <g transform="translate(30,76)">
      <text x="0" y="25" class="label">RDNA - Qwen 3.6 35B A3B</text>
      <text x="0" y="45" class="sub">R9700, Q4_K_XL</text>
      <rect x="490" y="0" width="150" height="52" rx="6" fill="#4ee6a6"/>
      <text x="565" y="26" class="cellText">117.9%</text>
      <rect x="680" y="0" width="150" height="52" rx="6" fill="#ff8f70"/>
      <text x="755" y="26" class="cellText">38.7%</text>
      <rect x="870" y="0" width="150" height="52" rx="6" fill="#ff647d"/>
      <text x="945" y="26" class="cellText">14.3%</text>
    </g>

    <g transform="translate(30,152)">
      <text x="0" y="25" class="label">RDNA - Qwen 3.5 9B</text>
      <text x="0" y="45" class="sub">R9700, Q4_K_M</text>
      <rect x="490" y="0" width="150" height="52" rx="6" fill="#4ee6a6"/>
      <text x="565" y="26" class="cellText">111.6%</text>
      <rect x="680" y="0" width="150" height="52" rx="6" fill="#ff647d"/>
      <text x="755" y="26" class="cellText">18.4%</text>
      <rect x="870" y="0" width="150" height="52" rx="6" fill="#ff8f70"/>
      <text x="945" y="26" class="cellText">34.0%</text>
    </g>

    <g transform="translate(30,228)">
      <text x="0" y="25" class="label">RDNA - Gemma 4 26B-A4B MoE</text>
      <text x="0" y="45" class="sub">R9700, Q4_K_M</text>
      <rect x="490" y="0" width="150" height="52" rx="6" fill="#ffcf77"/>
      <text x="565" y="26" class="cellText">88.0%</text>
      <rect x="680" y="0" width="150" height="52" rx="6" fill="#ff647d"/>
      <text x="755" y="26" class="cellText">17.9%</text>
      <rect x="870" y="0" width="150" height="52" rx="6" fill="#ff647d"/>
      <text x="945" y="26" class="cellText">13.2%</text>
    </g>

    <g transform="translate(30,304)">
      <text x="0" y="25" class="label">Metal - Qwen 3.6 35B A3B</text>
      <text x="0" y="45" class="sub">M4 Max, Q4_K_XL</text>
      <rect x="490" y="0" width="150" height="52" rx="6" fill="#4ee6a6"/>
      <text x="565" y="26" class="cellText">110.9%</text>
      <rect x="680" y="0" width="150" height="52" rx="6" fill="#ffcf77"/>
      <text x="755" y="26" class="cellText">64.3%</text>
      <rect x="870" y="0" width="150" height="52" rx="6" fill="#ff8f70"/>
      <text x="945" y="26" class="cellText">32.8%</text>
    </g>

    <g transform="translate(30,380)">
      <text x="0" y="25" class="label">Metal - Gemma 4 31B Dense</text>
      <text x="0" y="45" class="sub">M4 Max, Q4_K_M</text>
      <rect x="490" y="0" width="150" height="52" rx="6" fill="#ffcf77"/>
      <text x="565" y="26" class="cellText">93.8%</text>
      <rect x="680" y="0" width="150" height="52" rx="6" fill="#4ee6a6"/>
      <text x="755" y="26" class="cellText">157.0%</text>
      <rect x="870" y="0" width="150" height="52" rx="6" fill="#ff8f70"/>
      <text x="945" y="26" class="cellText">38.2%</text>
    </g>
  </g>

  <text x="52" y="724" fill="#8fa1b4" font-size="12">End-to-end is the full benchmark harness path, not pure GPU kernel throughput. It includes startup, request handling, and measurement overhead.</text>
</svg>
