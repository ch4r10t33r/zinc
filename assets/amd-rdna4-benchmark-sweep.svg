<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-labelledby="title desc">
  <title id="title">AMD RDNA4 benchmark sweep: ZINC vs llama.cpp</title>
  <desc id="desc">Five-model AMD RDNA4 comparison showing ZINC ahead of llama.cpp on decode throughput, prefill throughput, and overall percentage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="zinc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="llama" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="980" height="760" rx="24" fill="#0b0b0d"/>
  <rect x="24" y="24" width="932" height="712" rx="18" fill="url(#bg)" stroke="#27272a" filter="url(#shadow)"/>

  <text x="56" y="76" fill="#f4f4f5" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800">AMD RDNA4 — Radeon AI PRO R9700</text>
  <text x="56" y="106" fill="#a1a1aa" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">32 GB VRAM · 576 GB/s · fair server-vs-server suite · 2026-07-01</text>

  <g transform="translate(56 132)">
    <rect width="144" height="44" rx="22" fill="#102416" stroke="#225c34"/>
    <text x="20" y="28" fill="#22c55e" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800">5/5 decode</text>
  </g>
  <g transform="translate(216 132)">
    <rect width="144" height="44" rx="22" fill="#102416" stroke="#225c34"/>
    <text x="20" y="28" fill="#22c55e" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800">5/5 prefill</text>
  </g>
  <g transform="translate(376 132)">
    <rect width="146" height="44" rx="22" fill="#102416" stroke="#225c34"/>
    <text x="20" y="28" fill="#22c55e" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800">5/5 overall</text>
  </g>
  <g transform="translate(538 132)">
    <rect width="166" height="44" rx="22" fill="#21170b" stroke="#6b3b09"/>
    <text x="20" y="28" fill="#f59e0b" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800">166.8 tok/s top</text>
  </g>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">
    <circle cx="674" cy="214" r="6" fill="url(#zinc)"/>
    <text x="688" y="219" fill="#d4d4d8">ZINC</text>
    <circle cx="746" cy="214" r="6" fill="url(#llama)"/>
    <text x="760" y="219" fill="#d4d4d8">llama.cpp</text>
    <text x="858" y="219" fill="#71717a">decode tok/s</text>
  </g>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <line x1="56" y1="236" x2="924" y2="236" stroke="#27272a"/>

    <g transform="translate(56 262)">
      <text x="0" y="0" fill="#f4f4f5" font-size="19" font-weight="750">Qwen 3.6 35B A3B UD Q4K XL</text>
      <rect x="0" y="14" width="196" height="26" rx="13" fill="#102416" stroke="#225c34"/>
      <text x="16" y="33" fill="#22c55e" font-size="15" font-weight="800">1.54x llama.cpp</text>
      <rect x="304" y="-7" width="420" height="15" rx="8" fill="url(#zinc)"/>
      <rect x="304" y="22" width="273" height="15" rx="8" fill="url(#llama)"/>
      <text x="742" y="7" fill="#f4f4f5" font-size="15" font-weight="700" text-anchor="end">166.8</text>
      <text x="742" y="36" fill="#a1a1aa" font-size="15" text-anchor="end">108.5</text>
      <text x="304" y="62" fill="#a1a1aa" font-size="14">Prefill 540 ZINC · 397 llama.cpp · Overall 151%</text>
    </g>

    <g transform="translate(56 358)">
      <text x="0" y="0" fill="#f4f4f5" font-size="19" font-weight="750">Qwen 3.5 9B Q4K M</text>
      <rect x="0" y="14" width="196" height="26" rx="13" fill="#102416" stroke="#225c34"/>
      <text x="16" y="33" fill="#22c55e" font-size="15" font-weight="800">1.14x llama.cpp</text>
      <rect x="304" y="-7" width="246" height="15" rx="8" fill="url(#zinc)"/>
      <rect x="304" y="22" width="215" height="15" rx="8" fill="url(#llama)"/>
      <text x="742" y="7" fill="#f4f4f5" font-size="15" font-weight="700" text-anchor="end">97.5</text>
      <text x="742" y="36" fill="#a1a1aa" font-size="15" text-anchor="end">85.5</text>
      <text x="304" y="62" fill="#a1a1aa" font-size="14">Prefill 739 ZINC · 549 llama.cpp · Overall 115%</text>
    </g>

    <g transform="translate(56 454)">
      <text x="0" y="0" fill="#f4f4f5" font-size="19" font-weight="750">Qwen 3.6 27B Dense Q4K M</text>
      <rect x="0" y="14" width="196" height="26" rx="13" fill="#102416" stroke="#225c34"/>
      <text x="16" y="33" fill="#22c55e" font-size="15" font-weight="800">1.04x llama.cpp</text>
      <rect x="304" y="-7" width="81" height="15" rx="8" fill="url(#zinc)"/>
      <rect x="304" y="22" width="77" height="15" rx="8" fill="url(#llama)"/>
      <text x="742" y="7" fill="#f4f4f5" font-size="15" font-weight="700" text-anchor="end">32.0</text>
      <text x="742" y="36" fill="#a1a1aa" font-size="15" text-anchor="end">30.7</text>
      <text x="304" y="62" fill="#a1a1aa" font-size="14">Prefill 213 ZINC · 184 llama.cpp · Overall 105%</text>
    </g>

    <g transform="translate(56 550)">
      <text x="0" y="0" fill="#f4f4f5" font-size="19" font-weight="750">Gemma 4 26B-A4B MoE Q4K M</text>
      <rect x="0" y="14" width="196" height="26" rx="13" fill="#102416" stroke="#225c34"/>
      <text x="16" y="33" fill="#22c55e" font-size="15" font-weight="800">1.11x llama.cpp</text>
      <rect x="304" y="-7" width="286" height="15" rx="8" fill="url(#zinc)"/>
      <rect x="304" y="22" width="257" height="15" rx="8" fill="url(#llama)"/>
      <text x="742" y="7" fill="#f4f4f5" font-size="15" font-weight="700" text-anchor="end">113.7</text>
      <text x="742" y="36" fill="#a1a1aa" font-size="15" text-anchor="end">102.1</text>
      <text x="304" y="62" fill="#a1a1aa" font-size="14">Prefill 809 ZINC · 497 llama.cpp · Overall 115%</text>
    </g>

    <g transform="translate(56 646)">
      <text x="0" y="0" fill="#f4f4f5" font-size="19" font-weight="750">Gemma 4 31B Q4K M</text>
      <rect x="0" y="14" width="196" height="26" rx="13" fill="#102416" stroke="#225c34"/>
      <text x="16" y="33" fill="#22c55e" font-size="15" font-weight="800">1.01x llama.cpp</text>
      <rect x="304" y="-7" width="73" height="15" rx="8" fill="url(#zinc)"/>
      <rect x="304" y="22" width="72" height="15" rx="8" fill="url(#llama)"/>
      <text x="742" y="7" fill="#f4f4f5" font-size="15" font-weight="700" text-anchor="end">28.8</text>
      <text x="742" y="36" fill="#a1a1aa" font-size="15" text-anchor="end">28.5</text>
      <text x="304" y="62" fill="#a1a1aa" font-size="14">Prefill 249 ZINC · 200 llama.cpp · Overall 103%</text>
    </g>
  </g>
</svg>
