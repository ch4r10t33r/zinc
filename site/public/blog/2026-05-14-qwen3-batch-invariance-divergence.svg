<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial">
  <title id="title">Where 1000 temperature-zero Qwen3 runs diverge, and how a fixed split-KV reduction order keeps them locked</title>
  <desc id="desc">Two-panel schematic. The upper panel labeled non-deterministic forward pass shows a horizontal token strip of 110 small squares. Tokens 1 through 102 are uniform pale blue and labeled identical across 1000 runs. At token 103 the strip forks into two diverging branches. The thicker upper branch is labeled Queens, New York, 992 of 1000 runs. The thinner lower branch is labeled New York City, 8 of 1000 runs. A small histogram on the right shows 80 unique completions over 1000 sampling trials, with one bar at 78, one at 8, and a long tail. The lower panel labeled batch-invariant forward pass shows two stacked prefill timelines for the same prompt. The first uses chunked prefill with ubatch 512 and is split into 11 blue blocks of 512 plus a final block of 448. The second uses ubatch 1024 and is split into 5 blocks of 1024 plus a final block of 960. Below both timelines a third row labeled fixed split-KV size 256 shows 24 aligned green ticks of identical width, with every tick sitting under both timelines at the same boundaries. A green check mark on the right reads identical output, 1000 of 1000 runs. A footer credits the Thinking Machines September 2025 analysis, SGLang's 34 percent throughput slowdown, and llama.cpp PR 16016.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="forkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#fb923c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <style>
      .panel-title { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; letter-spacing: 0.02em; }
      .panel-sub { font: 400 11px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .label { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #e2e8f0; }
      .label-dim { font: 400 10px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .label-mono { font: 500 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #cbd5e1; }
      .header { font: 600 18px ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; }
      .subhead { font: 400 12px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .footer { font: 400 10px ui-sans-serif, system-ui, sans-serif; fill: #64748b; }
      .tok-uniform { fill: #60a5fa; opacity: 0.85; }
      .tok-fork { fill: #fb923c; }
      .chunk-512 { fill: #3b82f6; opacity: 0.85; }
      .chunk-1024 { fill: #6366f1; opacity: 0.85; }
      .kv-split { fill: #34d399; }
      .bar-major { fill: #f97316; }
      .bar-minor { fill: #fdba74; opacity: 0.7; }
      .bar-tail { fill: #fdba74; opacity: 0.4; }
      .divider { stroke: #1e293b; stroke-width: 1; }
      .check { fill: #34d399; }
    </style>
  </defs>

  <rect width="960" height="600" fill="url(#bgGrad)"/>

  <!-- Top header -->
  <text class="header" x="32" y="38">Where temperature zero stops being deterministic on Qwen3</text>
  <text class="subhead" x="32" y="58">1000 sampling runs at T=0, same prompt, same seed. The forward pass is run-to-run deterministic. It is not batch-invariant.</text>

  <!-- Divider -->
  <line class="divider" x1="32" y1="80" x2="928" y2="80"/>

  <!-- Upper panel: divergence -->
  <text class="panel-title" x="32" y="108">Non-batch-invariant forward pass</text>
  <text class="panel-sub" x="32" y="125">Qwen3-235B, "Tell me about Richard Feynman", greedy decode, 1000 runs.</text>

