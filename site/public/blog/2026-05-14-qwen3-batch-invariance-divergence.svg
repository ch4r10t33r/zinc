  <text class="footer" x="32" y="558">Sources: Thinking Machines Lab (Sep 2025), LMSYS SGLang deterministic-inference blog (Sep 2025), llama.cpp PR 16016 (deterministic CUDA mode, opt-in via GGML_DETERMINISTIC).</text>
  <text class="footer" x="32" y="574">RDNA4 / Vulkan: no batch-invariant flash attention path yet. The wave32 scalar FA fix from PR 19625 still uses query-length-dependent split sizes.</text>
  <text class="footer" x="32" y="590">zinc, May 2026.</text>
</svg>
