    <!-- Fork point marker at token 103 -->
    <line x1="617" y1="-6" x2="617" y2="34" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="2 2"/>
    <text class="label-dim" x="617" y="-10" text-anchor="middle">token 103</text>

    <!-- Upper fork branch: thick orange line to "Queens, New York" -->
    <path d="M 617 11 C 660 11 660 -28 720 -28" stroke="#fb923c" stroke-width="6" fill="none" opacity="0.9"/>
    <rect x="720" y="-44" width="170" height="32" rx="4" fill="#1e293b" stroke="#fb923c" stroke-width="1"/>
    <text class="label" x="730" y="-26">"Queens, New York"</text>
    <text class="label-dim" x="730" y="-14">992 of 1000 runs</text>

    <!-- Lower fork branch: thin orange line to "New York City" -->
    <path d="M 617 11 C 660 11 660 48 720 48" stroke="#fb923c" stroke-width="1.5" fill="none" opacity="0.9"/>
    <rect x="720" y="32" width="170" height="32" rx="4" fill="#1e293b" stroke="#fb923c" stroke-width="1"/>
