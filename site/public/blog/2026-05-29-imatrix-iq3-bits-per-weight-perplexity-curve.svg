<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, system-ui, sans-serif" role="img" aria-labelledby="imatrix-iq3-title imatrix-iq3-desc">
  <title id="imatrix-iq3-title">IQ-quant perplexity ratio versus bits-per-weight, all points imatrix-calibrated</title>
  <desc id="imatrix-iq3-desc">Scatter plot of ln(PPL(quant)/PPL(fp16)) against bits-per-weight for the IQ and Q3 families on Mistral-7B, with a dashed line indicating the IQ3_M operating point. All IQ-family points require an importance matrix to land on this curve. Numbers reproduce the Artefact2 table from llama.cpp PR 5676.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2440"/>
      <stop offset="1" stop-color="#0d1024"/>
    </linearGradient>
    <linearGradient id="bandIQ" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="60" y="56" fill="#f1f4ff" font-size="26" font-weight="700">The IQ curve sits on top of an importance matrix</text>
  <text x="60" y="86" fill="#cfd6f5" font-size="16">Mistral-7B, ln(PPL(quant) / PPL(fp16)) vs bits-per-weight. Lower is closer to fp16. Every IQ point on this plot was produced with imatrix calibration.</text>

  <!-- plot area -->
  <g transform="translate(110,140)">
    <!-- axes background -->
    <rect x="0" y="0" width="980" height="470" fill="#0a0d20" stroke="#2a3060" stroke-width="1"/>
    <!-- IQ family band -->
    <rect x="62" y="0" width="430" height="470" fill="url(#bandIQ)"/>

    <!-- y gridlines and labels: 0.0 to 1.0 in 0.2 steps -->
    <g font-size="13" fill="#a4adda">
      <line x1="0" y1="470" x2="980" y2="470" stroke="#2a3060"/>
      <line x1="0" y1="376" x2="980" y2="376" stroke="#2a3060" stroke-dasharray="3,4"/>
      <line x1="0" y1="282" x2="980" y2="282" stroke="#2a3060" stroke-dasharray="3,4"/>
      <line x1="0" y1="188" x2="980" y2="188" stroke="#2a3060" stroke-dasharray="3,4"/>
      <line x1="0" y1="94" x2="980" y2="94" stroke="#2a3060" stroke-dasharray="3,4"/>
      <line x1="0" y1="0" x2="980" y2="0" stroke="#2a3060" stroke-dasharray="3,4"/>
      <text x="-12" y="474" text-anchor="end">0.00</text>
      <text x="-12" y="380" text-anchor="end">0.20</text>
      <text x="-12" y="286" text-anchor="end">0.40</text>
      <text x="-12" y="192" text-anchor="end">0.60</text>
      <text x="-12" y="98" text-anchor="end">0.80</text>
      <text x="-12" y="4" text-anchor="end">1.00</text>
    </g>

    <!-- y axis title -->
    <text x="-72" y="235" fill="#cfd6f5" font-size="14" transform="rotate(-90 -72 235)" text-anchor="middle">ln(PPL ratio) vs fp16</text>

    <!-- x axis: 1.5 to 7.0 bpw; pixel-per-unit = 980/5.5 = 178.18 -->
    <g font-size="13" fill="#a4adda">
      <!-- x ticks at 2,3,4,5,6,7 -->
      <line x1="89" y1="470" x2="89" y2="476" stroke="#a4adda"/>
      <line x1="267" y1="470" x2="267" y2="476" stroke="#a4adda"/>
      <line x1="445" y1="470" x2="445" y2="476" stroke="#a4adda"/>
      <line x1="623" y1="470" x2="623" y2="476" stroke="#a4adda"/>
      <line x1="801" y1="470" x2="801" y2="476" stroke="#a4adda"/>
      <line x1="980" y1="470" x2="980" y2="476" stroke="#a4adda"/>
      <text x="89" y="496" text-anchor="middle">2.0</text>
      <text x="267" y="496" text-anchor="middle">3.0</text>
      <text x="445" y="496" text-anchor="middle">4.0</text>
      <text x="623" y="496" text-anchor="middle">5.0</text>
      <text x="801" y="496" text-anchor="middle">6.0</text>
      <text x="980" y="496" text-anchor="middle">7.0</text>
    </g>
    <text x="490" y="528" fill="#cfd6f5" font-size="14" text-anchor="middle">bits per weight (excluding output.weight)</text>

    <!-- band label -->
    <text x="277" y="22" fill="#67e8f9" font-size="13" font-weight="600">IQ-family (codebook + imatrix)</text>

    <!-- data points
         y mapping: y_px = 470 - ln_ratio * 470 (with 0..1 range)
         x mapping: x_px = (bpw - 1.5) * 178.18

         Numbers from PR #5676 Artefact2 table:
         IQ1_S   1.78  0.9235
         IQ2_XXS 2.20  0.2988
         IQ2_XS  2.43  0.2046
         Q2_K_S  2.79  0.1600  (k-quant)
         Q2_K    3.00  0.1103  (k-quant)
         IQ3_XXS 3.21  0.0589
         Q3_K_XS 3.32  0.0458  (IQ-mix)
         Q3_K_S  3.50  0.0511  (k-quant)
         IQ3_S   3.52  0.0306
         IQ3_M   3.63  0.0268
         Q3_K_M  3.89  0.0258  (k-quant)
         Q3_K_L  4.22  0.0205  (k-quant)
         IQ4_NL  4.56  0.0074
         Q4_K_S  4.57  0.0081  (k-quant)
         Q4_K_M  4.83  0.0060  (k-quant)
         Q5_K_S  5.52  0.0005  (k-quant)
         Q5_K_M  5.67  0.0005  (k-quant)
         Q6_K    6.57  -0.0008 (clamp to 0)
    -->

    <!-- helper: cy = 470 - val*470 -->
    <!-- IQ family points: cyan -->
    <g>
      <!-- IQ1_S 1.78, 0.9235 -->
      <circle cx="49.9" cy="36" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="60" y="32" fill="#a5f3fc" font-size="12">IQ1_S</text>
      <!-- IQ2_XXS 2.20, 0.2988 -->
      <circle cx="124.7" cy="329.6" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="134" y="325" fill="#a5f3fc" font-size="12">IQ2_XXS</text>
      <!-- IQ2_XS 2.43, 0.2046 -->
      <circle cx="165.7" cy="373.8" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="175" y="370" fill="#a5f3fc" font-size="12">IQ2_XS</text>
      <!-- IQ3_XXS 3.21, 0.0589 -->
      <circle cx="304.6" cy="442.3" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="313" y="438" fill="#a5f3fc" font-size="12">IQ3_XXS</text>
      <!-- IQ3_S 3.52, 0.0306 -->
      <circle cx="359.8" cy="455.6" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="368" y="451" fill="#a5f3fc" font-size="12">IQ3_S</text>
      <!-- IQ3_M 3.63, 0.0268 -->
      <circle cx="379.4" cy="457.4" r="7" fill="#facc15" stroke="#0a0d20" stroke-width="1.4"/>
      <text x="388" y="475" fill="#fde68a" font-size="13" font-weight="600">IQ3_M  3.63 bpw, ratio 0.027</text>
      <!-- IQ4_NL 4.56, 0.0074 -->
      <circle cx="545.1" cy="466.5" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="553" y="462" fill="#a5f3fc" font-size="12">IQ4_NL</text>
    </g>

    <!-- K-quant family points: copper -->
    <g>
      <!-- Q2_K_S 2.79, 0.1600 -->
      <rect x="225.4" y="389.8" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="241" y="399" fill="#fcd9a3" font-size="12">Q2_K_S</text>
      <!-- Q2_K 3.00, 0.1103 -->
      <rect x="262.9" y="418.2" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="278" y="427" fill="#fcd9a3" font-size="12">Q2_K</text>
      <!-- Q3_K_S 3.50, 0.0511 -->
      <rect x="350" y="446" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="365" y="455" fill="#fcd9a3" font-size="12">Q3_K_S</text>
      <!-- Q3_K_M 3.89, 0.0258 -->
      <rect x="419.4" y="457.8" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="436" y="466" fill="#fcd9a3" font-size="12">Q3_K_M</text>
      <!-- Q3_K_L 4.22, 0.0205 -->
      <rect x="478.2" y="460.4" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="495" y="468" fill="#fcd9a3" font-size="12">Q3_K_L</text>
      <!-- Q4_K_M 4.83, 0.0060 -->
      <rect x="586.9" y="467.2" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="603" y="473" fill="#fcd9a3" font-size="12">Q4_K_M</text>
      <!-- Q5_K_M 5.67, 0.0005 -->
      <rect x="736.6" y="469.8" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="755" y="476" fill="#fcd9a3" font-size="12">Q5_K_M</text>
      <!-- Q6_K 6.57, ~0 -->
      <rect x="897" y="469" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
      <text x="845" y="476" fill="#fcd9a3" font-size="12">Q6_K</text>
    </g>

    <!-- fp16 line -->
    <line x1="0" y1="470" x2="980" y2="470" stroke="#a5f3fc" stroke-width="1.2" stroke-dasharray="2,3" opacity="0.6"/>
    <text x="975" y="466" fill="#a5f3fc" font-size="11" text-anchor="end">fp16 floor</text>

    <!-- IQ3_M annotation arrow -->
    <g stroke="#facc15" stroke-width="1.4" fill="none">
      <path d="M 379 457 C 420 420, 510 380, 620 320" />
      <polygon points="619,325 626,316 631,328" fill="#facc15"/>
    </g>
    <g fill="#fde68a" font-size="13">
      <text x="635" y="316">IQ3_M sits below Q3_K_M at 0.26 bpw less,</text>
      <text x="635" y="334">and below Q3_K_L at 0.59 bpw less.</text>
      <text x="635" y="352">Without an imatrix, the cyan band collapses</text>
      <text x="635" y="370">and the curve looks like the copper one shifted up.</text>
    </g>
  </g>

  <!-- footer / legend -->
  <g transform="translate(110,640)">
    <circle cx="10" cy="10" r="6" fill="#22d3ee" stroke="#0a0d20" stroke-width="1.2"/>
    <text x="24" y="14" fill="#cfd6f5" font-size="13">IQ-quants: codebook + imatrix-weighted reconstruction</text>
    <rect x="370" y="4" width="11" height="11" fill="#f59e0b" stroke="#0a0d20" stroke-width="1.2"/>
    <text x="389" y="14" fill="#cfd6f5" font-size="13">k-quants: imatrix-weighted RMSE, no codebook</text>
    <circle cx="729" cy="10" r="7" fill="#facc15" stroke="#0a0d20" stroke-width="1.4"/>
    <text x="743" y="14" fill="#cfd6f5" font-size="13">IQ3_M: the focus of this post</text>
  </g>
  <text x="110" y="690" fill="#7c83b7" font-size="11">Mistral-7B numbers from Artefact2 in llama.cpp PR #5676 (KL-divergence table); axis values truncated to two decimals. IQ-family values are not achievable without an importance matrix.</text>
</svg>
