name: GLM Code Review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  push:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: glm-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request_target' && !github.event.pull_request.draft) ||
      (github.event_name == 'push' && startsWith(github.event.ref, 'refs/heads/'))
    runs-on: ubuntu-latest
    env:
      GITHUB_API_URL: ${{ github.api_url }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PUSH_BEFORE: ${{ github.event.before }}
      PUSH_AFTER: ${{ github.event.after }}
      PUSH_FORCED: ${{ github.event.forced }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN }}
      ZAI_BASE_URL: https://api.z.ai/api/coding/paas/v4
      ZAI_MODEL: glm-5.2
    steps:
      - name: Review with GLM-5.2
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          marker = "<!-- glm-code-review -->"
          zero_sha = "0" * 40

          def request_json(url, method="GET", headers=None, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers or {}, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=300) as resp:
                      raw = resp.read().decode("utf-8", "replace")
                      return json.loads(raw) if raw else None
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")
                  print(f"HTTP {exc.code} for {method} {url}\n{detail}", file=sys.stderr)
                  raise

          def request_text(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {}, method="GET")
              try:
                  with urllib.request.urlopen(req, timeout=300) as resp:
                      return resp.read().decode("utf-8", "replace")
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")
                  print(f"HTTP {exc.code} for GET {url}\n{detail}", file=sys.stderr)
                  raise

          repo = os.environ["GITHUB_REPOSITORY"]
          github_token = os.environ["GITHUB_TOKEN"]
          zai_key = os.environ["ZAI_API_KEY"].strip()
          if not zai_key:
              raise SystemExit("Missing ZAI_API_KEY or ANTHROPIC_AUTH_TOKEN secret")

          github_api = os.environ["GITHUB_API_URL"].rstrip("/")
          zai_base = os.environ["ZAI_BASE_URL"].rstrip("/")
          model = os.environ["ZAI_MODEL"]
          event_name = os.environ["GITHUB_EVENT_NAME"]

          gh_headers = {
              "Authorization": f"Bearer {github_token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "zinc-glm-review",
          }
          gh_diff_headers = {
              "Authorization": f"Bearer {github_token}",
              "Accept": "application/vnd.github.v3.diff",
              "User-Agent": "zinc-glm-review",
          }

          # ── Resolve what to diff and where to post the review ──────────
          #
          # pull_request_target: diff the whole current PR (base...head), post/
          # update a single rolling comment on the PR -- unchanged from before.
          #
          # push: diff only what this push actually added, so unrelated history
          # never gets pulled into the "review". Then post to the open PR for
          # this branch if one exists (continuing that PR's rolling comment),
          # otherwise post a standalone commit comment so the review is still
          # visible even before a PR exists.
          if event_name == "pull_request_target":
              pr_number = os.environ["PR_NUMBER"]
              diff_url = f"{github_api}/repos/{repo}/pulls/{pr_number}"
              diff = request_text(diff_url, gh_diff_headers)
              post_pr_number = pr_number
              post_commit_sha = None
          elif event_name == "push":
              after = os.environ["PUSH_AFTER"]
              before = os.environ["PUSH_BEFORE"]
              forced = os.environ["PUSH_FORCED"] == "true"

              if after == zero_sha:
                  print("Branch deleted; nothing to review.")
                  sys.exit(0)

              commit_info = request_json(f"{github_api}/repos/{repo}/commits/{after}", headers=gh_headers)
              if len(commit_info.get("parents", [])) > 1:
                  print("Merge commit; already covered by its originating PR review.")
                  sys.exit(0)

              # A brand-new branch (before == zero_sha) or a force-push/rebase
              # (before may no longer be an ancestor of after) makes `before`
              # unreliable as a diff base -- comparing against it could pull in
              # unrelated upstream history. Fall back to just the tip commit.
              base = f"{after}^" if (before == zero_sha or forced) else before
              diff_url = f"{github_api}/repos/{repo}/compare/{base}...{after}"
              diff = request_text(diff_url, gh_diff_headers)

              pulls_url = f"{github_api}/repos/{repo}/commits/{after}/pulls"
              associated = request_json(pulls_url, headers={**gh_headers, "Accept": "application/vnd.github.groot-preview+json"}) or []
              open_pr = next((p for p in associated if p.get("state") == "open"), None)
              post_pr_number = str(open_pr["number"]) if open_pr else None
              post_commit_sha = after if open_pr is None else None
          else:
              raise SystemExit(f"Unexpected event: {event_name}")

          diff_limit = 120000
          truncated = len(diff) > diff_limit
          if truncated:
              diff = diff[:diff_limit]
          if not diff.strip():
              print("Empty diff; nothing to review.")
              sys.exit(0)

          system_prompt = (
              "You are a senior engineer reviewing a GitHub pull request.\n"
              "Return concise, well-formatted markdown.\n"
              "Prioritize bugs, security issues, regressions, performance problems, and missing tests.\n"
              "Use emoji severity labels in headings: 🔴 Critical, 🟠 High, 🟡 Medium, 🟢 Low.\n"
              "Structure findings as:\n"
              "## Findings\n"
              "### <short title> — <emoji severity>\n"
              "- File: <path>\n"
              "- Impact: <one sentence>\n"
              "- Fix: <one sentence>\n"
              "Keep each finding tight and actionable.\n"
              "Do not include self-corrections, meta commentary, or chain-of-thought.\n"
              "If there are no actionable issues, reply exactly: No issues found.\n"
              "At the end, include `Verdict: BLOCK` if any finding is High or Critical.\n"
              "Otherwise include `Verdict: PASS`."
          )

          user_prompt = "Review the following pull request diff.\n\n"
          if truncated:
              user_prompt += f"(Diff truncated to {diff_limit} characters for context limits.)\n\n"
          user_prompt += diff

          review_request = {
              "model": model,
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": user_prompt},
              ],
              "thinking": {"type": "disabled"},
              "max_tokens": 2048,
              "temperature": 0.2,
          }
          review_headers = {
              "Authorization": f"Bearer {zai_key}",
              "Content-Type": "application/json",
              "Accept-Language": "en-US,en",
              "User-Agent": "zinc-glm-review",
          }
          review_url = f"{zai_base}/chat/completions"
          review_data = request_json(review_url, method="POST", headers=review_headers, payload=review_request)
          message = review_data["choices"][0]["message"]
          content = (message.get("content") or "").strip()
          if not content:
              content = (message.get("reasoning_content") or "").strip()
          if not content:
              raise SystemExit("GLM returned an empty review body")

          verdict_match = re.search(r"(?im)^Verdict:\s*(BLOCK|PASS)\s*$", content)
          if verdict_match:
              verdict = verdict_match.group(1).upper()
              content = re.sub(r"(?im)\n?^Verdict:\s*(BLOCK|PASS)\s*$", "", content).rstrip()
          else:
              verdict = "BLOCK" if re.search(r"(?i)\bcritical\b|\bhigh severity\b|🔴|🟠", content) else "PASS"

          body = f"{marker}\n\n## GLM Review\n\n{content}\n\n**Verdict:** {verdict}\n"

          if post_pr_number is not None:
              comments_url = f"{github_api}/repos/{repo}/issues/{post_pr_number}/comments?per_page=100"
              comments = request_json(comments_url, headers=gh_headers)

              existing = None
              for comment in comments:
                  if marker in comment.get("body", "") and comment.get("user", {}).get("login") == "github-actions[bot]":
                      existing = comment
                      break

              write_headers = {**gh_headers, "Content-Type": "application/json"}
              if existing is None:
                  request_json(comments_url.rsplit("?", 1)[0], method="POST", headers=write_headers, payload={"body": body})
                  print(f"Posted GLM review comment on PR #{post_pr_number}.")
              else:
                  request_json(existing["url"], method="PATCH", headers=write_headers, payload={"body": body})
                  print(f"Updated existing GLM review comment on PR #{post_pr_number}.")
          else:
              # No open PR for this push yet -- leave the review on the commit
              # itself so it's still visible (each commit gets its own comment;
              # there's no earlier one to update).
              commit_comments_url = f"{github_api}/repos/{repo}/commits/{post_commit_sha}/comments"
              write_headers = {**gh_headers, "Content-Type": "application/json"}
              request_json(commit_comments_url, method="POST", headers=write_headers, payload={"body": body})
              print(f"Posted GLM review as a commit comment on {post_commit_sha}.")

          if verdict == "BLOCK":
              raise SystemExit("GLM review flagged High or Critical findings")
          PY
