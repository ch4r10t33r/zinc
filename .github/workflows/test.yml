name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2
        use-cache: false

    - name: Install Vulkan SDK (LunarG — modern shaderc/glslc with GL_EXT_integer_dot_product)
      # Ubuntu's stock `glslc` (shaderc 2023.x and earlier on ubuntu-latest) does not
      # recognise GL_EXT_integer_dot_product / dotPacked4x8AccSatEXT, which several
      # DP4a shaders in src/shaders/ now require. Install LunarG's official Vulkan SDK
      # instead — it ships a current shaderc and also provides headers + tools.
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg lsb-release
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
          | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
        UB_CODENAME=$(lsb_release -cs)
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-${UB_CODENAME}.list \
          https://packages.lunarg.com/vulkan/lunarg-vulkan-${UB_CODENAME}.list
        sudo apt-get update
        sudo apt-get install -y vulkan-sdk libvulkan-dev vulkan-tools
        echo "--- glslc version (must be >= 2024 for dp4a) ---"
        glslc --version

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Run Zig Tests
      run: zig build test --summary all

    - name: Build
      run: zig build
