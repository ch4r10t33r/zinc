    <text class="label-dim" x="220" y="40">A long tail of one-off completions, all from the same prompt at temperature 0.</text>
  </g>

  <!-- Divider -->
  <line class="divider" x1="32" y1="345" x2="928" y2="345"/>

  <!-- Lower panel: fixed split-KV fix -->
  <text class="panel-title" x="32" y="370">Batch-invariant forward pass with fixed split-KV size = 256</text>
  <text class="panel-sub" x="32" y="386">Same 6000-token prompt, two different chunked prefill configurations. The KV reduction landing pattern stays identical.</text>

  <!-- ubatch 512 row: 11 blocks of width 36 + 1 trailing -->
