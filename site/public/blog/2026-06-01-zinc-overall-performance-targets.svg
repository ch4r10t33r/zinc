<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102038"/>
      <stop offset="1" stop-color="#13251f"/>
    </linearGradient>
    <linearGradient id="zinc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#40d7ff"/>
      <stop offset="1" stop-color="#58e6a9"/>
    </linearGradient>
    <linearGradient id="baseline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa7b8"/>
      <stop offset="1" stop-color="#c7ced9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#051018" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="0" fill="url(#bg)"/>

  <text x="56" y="62" fill="#f6fbff" font-size="30" font-weight="750">ZINC performance snapshot</text>
  <text x="56" y="94" fill="#b8cad6" font-size="15">Current dashboard data, generated June 1, 2026. Best ZINC decode result per target, with the matching llama.cpp decode baseline where available.</text>

  <g transform="translate(56,136)">
    <rect width="1088" height="166" rx="8" fill="#122b42" stroke="#33546d" filter="url(#shadow)"/>
    <text x="26" y="34" fill="#dff7ff" font-size="16" font-weight="700">AMD RDNA / Radeon AI PRO R9700</text>
    <text x="26" y="60" fill="#9fb6c5" font-size="13">Qwen 3.6 35B A3B UD Q4_K_XL</text>
    <text x="26" y="104" fill="#f6fbff" font-size="46" font-weight="800">127.9 tok/s</text>
    <text x="26" y="132" fill="#9fb6c5" font-size="13">ZINC decode median</text>
    <text x="888" y="34" fill="#dff7ff" font-size="15" font-weight="700">Decode vs llama.cpp</text>
    <text x="888" y="64" fill="#58e6a9" font-size="38" font-weight="800">117.9%</text>
    <text x="888" y="91" fill="#9fb6c5" font-size="13">127.9 vs 108.5 tok/s</text>

    <g transform="translate(330,50)">
      <text x="0" y="0" fill="#9fb6c5" font-size="12">ZINC</text>
      <rect x="0" y="10" width="520" height="24" rx="4" fill="#0b1827"/>
      <rect x="0" y="10" width="520" height="24" rx="4" fill="url(#zinc)"/>
      <text x="532" y="28" fill="#e8fbff" font-size="13" font-weight="700">127.9</text>
      <text x="0" y="60" fill="#9fb6c5" font-size="12">llama.cpp</text>
      <rect x="0" y="70" width="520" height="24" rx="4" fill="#0b1827"/>
      <rect x="0" y="70" width="441" height="24" rx="4" fill="url(#baseline)"/>
      <text x="453" y="88" fill="#e8fbff" font-size="13" font-weight="700">108.5</text>
    </g>
  </g>

  <g transform="translate(56,330)">
    <rect width="1088" height="166" rx="8" fill="#172a32" stroke="#38535c" filter="url(#shadow)"/>
    <text x="26" y="34" fill="#e9fbff" font-size="16" font-weight="700">Apple Metal / M4 Max</text>
    <text x="26" y="60" fill="#a6bcc2" font-size="13">Qwen 3.6 35B A3B UD Q4_K_XL</text>
    <text x="26" y="104" fill="#f6fbff" font-size="46" font-weight="800">81.07 tok/s</text>
    <text x="26" y="132" fill="#a6bcc2" font-size="13">ZINC decode median</text>
    <text x="888" y="34" fill="#e9fbff" font-size="15" font-weight="700">Decode vs llama.cpp</text>
    <text x="888" y="64" fill="#58e6a9" font-size="38" font-weight="800">110.9%</text>
    <text x="888" y="91" fill="#a6bcc2" font-size="13">81.07 vs 73.09 tok/s</text>

    <g transform="translate(330,50)">
      <text x="0" y="0" fill="#a6bcc2" font-size="12">ZINC</text>
      <rect x="0" y="10" width="520" height="24" rx="4" fill="#0b1827"/>
      <rect x="0" y="10" width="520" height="24" rx="4" fill="url(#zinc)"/>
      <text x="532" y="28" fill="#e8fbff" font-size="13" font-weight="700">81.07</text>
      <text x="0" y="60" fill="#a6bcc2" font-size="12">llama.cpp</text>
      <rect x="0" y="70" width="520" height="24" rx="4" fill="#0b1827"/>
      <rect x="0" y="70" width="469" height="24" rx="4" fill="url(#baseline)"/>
      <text x="481" y="88" fill="#e8fbff" font-size="13" font-weight="700">73.09</text>
    </g>
  </g>

  <g transform="translate(56,524)">
    <rect width="1088" height="112" rx="8" fill="#1a2634" stroke="#3d5265" filter="url(#shadow)"/>
    <text x="26" y="34" fill="#e9fbff" font-size="16" font-weight="700">Intel Arc Pro B70 / Vulkan path</text>
    <text x="26" y="60" fill="#a6bcc2" font-size="13">Early data: only one current ZINC success in the matrix</text>
    <text x="474" y="46" fill="#f6fbff" font-size="34" font-weight="800">43.9 tok/s</text>
    <text x="474" y="72" fill="#a6bcc2" font-size="13">Qwen 3 8B Q4_K_M decode</text>
    <text x="824" y="46" fill="#ffcf77" font-size="28" font-weight="800">experimental</text>
    <text x="824" y="72" fill="#a6bcc2" font-size="13">not part of the v0.1 release matrix</text>
  </g>

  <text x="56" y="682" fill="#8fa5b4" font-size="12">Source: site/src/data/zinc-performance.json. Values are medians from the dashboard matrix, not universal hardware claims.</text>
</svg>
