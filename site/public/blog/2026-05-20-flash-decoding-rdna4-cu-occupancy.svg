<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" role="img" aria-labelledby="title desc">
<title id="title">Flash-Decoding fills the idle compute units of a batch=1 long-context decode on the Radeon AI PRO R9700</title>
<desc id="desc">A two-panel data visualization on a dark slate background. The left panel shows two eight by eight grids of the R9700 64 compute units at batch one. The upper grid, FlashAttention, has 32 cells lit in cyan and 32 dark and idle. The lower grid, Flash-Decoding, has all 64 cells lit in a cyan to violet gradient. The right panel is a log-scale line chart of A100 attention runtime in the batch one regime: an orange FlashAttention v2 line climbing to 4592 microseconds at 128k context, and a flat cyan Flash-Decoding line between 56 and 107 microseconds.</desc>
<style>
 .ink{fill:#e8eef7} .soft{fill:#9fb0c7} .fnt{fill:#6b7d97}
 .t{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif}
 .m{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
 .title{font-size:18px;font-weight:600}
 .sub{font-size:12.5px}
 .ptitle{font-size:14px;font-weight:600}
 .lab{font-size:12px} .labs{font-size:11px} .labf{font-size:10px}
 .bold{font-weight:600}
</style>
