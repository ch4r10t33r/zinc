<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1724"/><stop offset="1" stop-color="#18251f"/></linearGradient>
    <linearGradient id="memfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38d7ff" stop-opacity="0.10"/><stop offset="1" stop-color="#38d7ff" stop-opacity="0"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ffd86b"/></marker>
    <style>
      .title{fill:#f6fbff;font-size:31px;font-weight:780}
      .subtitle{fill:#aebdcc;font-size:15px}
      .axis{fill:#8595a8;font-size:14px}
      .axistitle{fill:#c7d4e2;font-size:15px;font-weight:640}
      .roof{fill:#9fb0c0;font-size:14px;font-weight:640}
      .ptitle{fill:#f6fbff;font-size:19px;font-weight:780}
      .psub{fill:#9fb0c0;font-size:13px}
      .gain{fill:#ffd86b;font-size:17px;font-weight:820}
      .leg{fill:#aebdcc;font-size:14px}
    </style>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>

  <text x="56" y="56" class="title">One matmul, two rooflines: the RX 9070 XT prefill GEMM</text>
  <text x="56" y="84" class="subtitle">Achievable throughput vs operational intensity. 640 GB/s memory roof, 195 TFLOP/s fp16-matrix roof, ridge ~305 FLOP/byte.</text>
  <text x="56" y="106" class="subtitle">First-order model: 256-token prefill tile, weight DRAM traffic only.</text>

  <!-- plot frame -->
  <rect x="160" y="180" width="960" height="600" fill="none" stroke="#263548"/>

  <!-- memory-bound shaded region under diagonal (approx polygon) -->
  <polygon points="235,780 735,256 735,780" fill="url(#memfill)"/>

  <!-- X gridlines: 10,100,305,1000 -->
  <line x1="160" y1="180" x2="160" y2="780" stroke="#263548" stroke-dasharray="4 6"/>
  <text x="160" y="804" text-anchor="middle" class="axis">10</text>
  <line x1="548" y1="180" x2="548" y2="780" stroke="#263548" stroke-dasharray="4 6"/>
  <text x="548" y="804" text-anchor="middle" class="axis">100</text>
  <line x1="935" y1="180" x2="935" y2="780" stroke="#263548" stroke-dasharray="4 6"/>
  <text x="935" y="804" text-anchor="middle" class="axis">1000</text>
  <text x="640" y="838" text-anchor="middle" class="axistitle">operational intensity (FLOP / byte, log scale)</text>

  <!-- Y gridlines: 10,100,195,300 -->
  <line x1="160" y1="780" x2="1120" y2="780" stroke="#263548" stroke-dasharray="4 6"/>
  <text x="150" y="785" text-anchor="end" class="axis">10</text>
  <line x1="160" y1="374" x2="1120" y2="374" stroke="#263548" stroke-dasharray="4 6"/>
  <text x="150" y="379" text-anchor="end" class="axis">100</text>
  <text x="150" y="261" text-anchor="end" class="axis">195</text>
  <text x="150" y="185" text-anchor="end" class="axis">300</text>
  <text x="70" y="480" transform="rotate(-90 70 480)" text-anchor="middle" class="axistitle">throughput (TFLOP/s, log scale)</text>

  <!-- memory roof (diagonal) -->
  <line x1="235" y1="780" x2="735" y2="256" stroke="#38d7ff" stroke-width="3"/>
  <!-- compute roof (flat at 195) -->
  <line x1="735" y1="256" x2="1120" y2="256" stroke="#58e6a9" stroke-width="3"/>
  <text x="300" y="560" transform="rotate(-46 300 560)" class="roof" fill="#38d7ff">memory roof — 640 GB/s</text>
  <text x="1112" y="286" text-anchor="end" class="roof" fill="#58e6a9">compute roof — 195 TFLOP/s</text>

  <!-- ridge marker -->
  <circle cx="735" cy="256" r="4" fill="#c7d4e2"/>
  <line x1="735" y1="256" x2="735" y2="780" stroke="#3a4d63" stroke-dasharray="2 6"/>
  <text x="735" y="300" text-anchor="middle" class="roof" fill="#c7d4e2">ridge ~305</text>

  <!-- traffic-cut arrow from staged to fused -->
  <line x1="590" y1="424" x2="895" y2="264" stroke="#ffd86b" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="712" y="330" text-anchor="middle" class="gain">8× less weight traffic</text>

  <!-- staged point -->
  <circle cx="566" cy="432" r="9" fill="#ff9b6b" stroke="#0f1724" stroke-width="2"/>
  <text x="566" y="470" text-anchor="middle" class="ptitle" fill="#ff9b6b">staged</text>
  <text x="566" y="490" text-anchor="middle" class="psub">dequant → fp16 scratch → GEMM</text>
  <text x="566" y="508" text-anchor="middle" class="psub">~112 FLOP/B · ~72 TFLOP/s · memory-bound</text>

  <!-- fused point -->
  <circle cx="919" cy="256" r="9" fill="#58e6a9" stroke="#0f1724" stroke-width="2"/>
  <text x="919" y="212" text-anchor="middle" class="ptitle" fill="#58e6a9">fused (MMQ-style)</text>
  <text x="919" y="232" text-anchor="middle" class="psub">unpack Q4_K in registers, no spill · ~910 FLOP/B · compute-bound</text>

  <!-- legend -->
  <g transform="translate(176,196)">
    <circle cx="8" cy="8" r="7" fill="#ff9b6b"/><text x="24" y="13" class="leg">ZINC today (staged)</text>
    <circle cx="212" cy="8" r="7" fill="#58e6a9"/><text x="228" y="13" class="leg">fused-dequant target</text>
  </g>
</svg>
